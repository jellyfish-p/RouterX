          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PaymentOrderInfo"
    StripeWebhookEvent:
      type: object
      required: [id, type, data]
      properties:
        id:
          type: string
          description: Stripe event id，用作 payment_events 幂等键。
          example: evt_123
        type:
          type: string
          description: 当前基础实现会处理 checkout.session.completed、charge.refunded、charge.dispute.created、charge.dispute.updated、charge.dispute.closed、charge.dispute.funds_withdrawn 和 charge.dispute.funds_reinstated。
          example: checkout.session.completed
        data:
          type: object
          required: [object]
          properties:
            object:
              type: object
              description: Stripe Checkout Session、Charge 或 Dispute 对象。
              properties:
                id:
                  type: string
                  example: cs_test_123
                amount:
                  type: integer
                  format: int64
                  description: Charge/Dispute 原金额，退款和争议事件可用。
                amount_total:
                  type: integer
                  format: int64
                  description: Stripe minor unit 金额，例如 9.99 USD 为 999。
                  example: 999
                amount_refunded:
                  type: integer
                  format: int64
                  description: Stripe minor unit 退款金额；等于订单金额时为全额退款，小于订单金额时记录为部分退款并按比例扣回。
                currency:
                  type: string
                  example: usd
                payment_status:
                  type: string
                  example: paid
                payment_intent:
                  type: string
                  example: pi_123
                metadata:
                  type: object
                  description: 支付成功事件要求 order_no/product_id/user_id；退款或争议事件可仅携带 order_no，或通过 payment_intent 回查订单。
                  properties:
                    order_no: { type: string }
                    product_id: { type: string }
                    user_id: { type: string }
