        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: alert_id
          in: query
          required: false
          schema: { type: integer, format: uint64 }
          description: 按告警 ID 过滤。
        - name: target
          in: query
          required: false
          schema:
            type: string
            enum: [webhook, email, im]
          description: 按投递目标过滤。
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, completed, failed]
          description: 按投递状态过滤。
      responses:
        "200":
          description: 告警投递分页列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AlertDeliveryOutboxPage"
  /v0/admin/alerts/deliveries/replay:
    post:
      tags: [Admin Alerts]
      summary: 重放告警投递
      description: 手动重放到期的 pending 告警投递。limit 默认为 20，服务端最大按 100 截断；可选 target=webhook/email/im 仅重放单一目标。对应 alert.<target>.enabled 未启用或 alert.<target>.url 未配置时返回 replayed=0。
      security:
        - UserJWT: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
            minimum: 1
          description: 本次最多重放的 pending 投递数。
        - name: target
          in: query
          required: false
          schema:
            type: string
            enum: [webhook, email, im]
          description: 可选；仅重放指定投递目标。
