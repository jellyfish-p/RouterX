      summary: API Key 风险视图
      description: 管理员按时间窗口查看异常 API Key；聚合调用数、成功/失败数、额度消耗、最近调用和风险原因。泄露上报 Key 会返回 rotation_recommended=true、rotation_reason=leak_reported 和 rotate_key 建议。响应只返回脱敏 API Key 摘要，不返回明文 Key 或哈希。
