    Log:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        user_id: { type: integer, format: uint64 }
        token_id: { type: integer, format: uint64, nullable: true }
        channel_id: { type: integer, format: uint64, nullable: true }
        model: { type: string }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
        usage_source:
          type: string
          description: usage 来源；当前已落地 upstream 和 minimum。
          enum: ["", upstream, minimum, adapter, tokenizer, estimate]
        quota_used: { type: integer, format: int64 }
        status: { type: integer, description: "1=success, 2=failed" }
        request_id:
          type: string
          nullable: true
          description: HTTP 请求追踪 ID，用于关联访问日志、调用日志和审计日志。
        error_code:
          type: string
          description: 稳定错误 code；成功调用为空。
        error_source:
          type: string
          description: 失败来源；成功调用为空。
          enum: ["", request, auth, quota, route, channel, upstream, billing, system]
        upstream_status:
          type: integer
          description: 上游 HTTP 状态；未调用上游或非上游错误时为 0/省略。
        request_snapshot:
          type: string
          description: 脱敏请求快照 JSON 字符串；当前包含 request_id、入口协议、API 类型、请求模型、stream 标记和安全路由摘要。
        policy_snapshot:
          type: string
          description: 脱敏策略快照 JSON 字符串；当前包含成功 allow、额度预检、基础 scope allow、API Key scope 拒绝、基础余额预检拒绝、用户分组 x 通道分组访问控制拒绝、无可用候选 no_available_channel 拒绝和 Redis Token 限流拒绝摘要。
        route_snapshot:
          type: string
          description: 脱敏路由快照 JSON 字符串；当前包含请求模型、候选数量、候选过滤原因、选中通道、provider、分组、优先级、权重、模型重写摘要和非流式重试摘要。
        billing_snapshot:
          type: string
          description: 脱敏计费快照 JSON 字符串；当前包含结算状态、usage_source、P0 表达式、默认倍率、最终扣费、Key 预算前后和用户余额前后摘要。
        error_msg: { type: string }
        ip: { type: string }
        created_at: { type: string, format: date-time }
