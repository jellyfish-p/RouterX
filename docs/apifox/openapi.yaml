  /v1/responses:
    post:
      tags: [OpenAI Compatible]
      summary: OpenAI Responses API 转发
      description: OpenAI-compatible Responses 基础实现；JSON 请求体可透传到 OpenAI-compatible 上游 /v1/responses，stream=true 且命中 OpenAI SSE 形态通道时透传 text/event-stream，Azure OpenAI 通道可转发 JSON 请求到 /openai/v1/responses?api-version=preview，Claude/Anthropic 通道支持基础非流式 Responses 转 /v1/messages，Gemini 通道支持基础非流式 Responses 转 /v1beta/models/{model}:generateContent，并将 input、instructions、max_output_tokens 和基础生成参数映射到对应上游。发出前剥离 routerx 私有字段，并将非流式 usage.input_tokens/output_tokens/total_tokens、Claude usage.input_tokens/output_tokens、Gemini usageMetadata 或流式 response.completed.response.usage 映射到 RouterX 日志与扣费。完整 Responses 原生事件矩阵以 docs/PROTOCOLS.md 为准。
      security:
        - ApiKeyBearer: []
      parameters:
        - $ref: "#/components/parameters/RouterXOptions"
        - $ref: "#/components/parameters/RouterXHop"
        - $ref: "#/components/parameters/RouterXChain"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OpenAI-compatible Responses 响应；stream=true 时为 SSE。
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            text/event-stream:
              schema:
                type: string
                description: "OpenAI-compatible Responses SSE events ending with data: [DONE]."
        "4XX":
          $ref: "#/components/responses/OpenAIError"
        "5XX":
          $ref: "#/components/responses/OpenAIError"
  /v1/chat/completions:
    post:
      tags: [OpenAI Compatible]
      summary: OpenAI Chat Completions 转发
      description: P0 稳定闭环；支持非流式 JSON 响应和 OpenAI-compatible SSE 基础流式。本地限流读取 rate_limit.*，覆盖全局、IP、Token、用户、模型和通道分钟窗口；API Key max_concurrency 可限制同一 Key 同时在途请求，rpm/tpm 可限制同一 Key 每分钟请求和模型 token，命中时返回 rate_limit_exceeded 且不调用上游。通道候选读取 relay.error_auto_ban、relay.error_ban_threshold 和 relay.error_ban_cooldown_seconds，自动排除达到阈值且仍在冷却窗口内的故障通道，冷却后可重新进入候选作为半开探测。非流式在 relay.retry_count > 0 时会对 relay.retry_on_status 白名单状态码（默认 429/500/502/503/504）、网络错误、超时和响应读取失败换候选通道；400/401/403 默认不重试。stream=true 仅支持 OpenAI SSE 形态通道；命中 Anthropic/Gemini 等非 OpenAI SSE 通道时返回 unsupported_stream_channel。routerx.route 可在已允许候选通道内按分组、通道或 provider 收窄。
      security:
        - ApiKeyBearer: []
      parameters:
        - $ref: "#/components/parameters/RouterXOptions"
        - $ref: "#/components/parameters/RouterXHop"
        - $ref: "#/components/parameters/RouterXChain"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: OpenAI-compatible Chat 响应；stream=true 时为 SSE。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                type: string
                description: "OpenAI-compatible SSE data chunks ending with data: [DONE]."
        "400":
          description: 请求体或 routerx 扩展非法；常见 code 包括 invalid_json、model_required、invalid_routerx_options、invalid_routerx_route。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "413":
          description: 请求体超过 relay.max_request_body_bytes 时本地拒绝且不调用上游，code 为 request_body_too_large；OpenAI-compatible multipart 单个文件字段超过 relay.max_multipart_file_bytes 时 code 为 request_file_too_large，路径形态、危险扩展名、扩展名或文件头与图片/音频 API 不匹配或可执行/脚本内容签名基础扫描命中时返回 400 unsafe_multipart_file。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "401":
          $ref: "#/components/responses/OpenAIError"
        "403":
          description: API Key scope 或访问策略拒绝；模型 allow-list 未命中时 code 为 model_not_allowed，APIType、入口协议、IP/CIDR 或方法路径 allow-list 未命中时 code 为 token_forbidden，API Key 通道分组 allow-list 或用户分组通道分组访问控制未命中时 code 为 route_forbidden。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "429":
          description: 余额不足、API Key 日/月预算达到上限、API Key 并发或 RPM/TPM 上限、本地限流或上游限流。常见 code 包括 insufficient_quota、rate_limit_exceeded、upstream_429。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "502":
          description: 无可用通道或上游错误；routerx.route 筛选后无候选时返回 no_available_channel，选中通道 adapter 不支持当前 APIType 时返回 unsupported_api_type 且不调用上游；非流式命中 relay.retry_on_status 白名单、网络错误、超时或响应读取失败时会按 relay.retry_count 换候选，耗尽后返回最后一次上游错误；上游响应体超过 relay.max_response_body_bytes 时返回 upstream_response_too_large，billing.usage_missing_strategy=reject 且上游缺少 usage 时返回 usage_missing，stream=true 命中非 OpenAI SSE 通道时返回 unsupported_stream_channel。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "504":
          description: 上游调用超时，code 为 upstream_timeout。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
