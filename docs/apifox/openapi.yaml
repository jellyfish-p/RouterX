  /v0/admin/redem:
    get:
      tags: [Admin Redemption]
      summary: 充值码列表
      description: 管理员查看充值码，可按状态、code/batch/note 关键字和 batch_no 过滤。状态：0 未使用，1 已使用，2 已作废。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
