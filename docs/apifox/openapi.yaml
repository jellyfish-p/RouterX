  /v0/admin/audit:
    get:
      tags: [Admin Audit]
      summary: 管理审计日志列表
      description: 超级管理员查询管理审计日志；当前基础实现已覆盖成功登录，API Key 创建、编辑、禁用、删除、轮换、泄露上报、批量禁用、批量过期、批量操作缺少筛选条件拒绝、用户端额度编辑拒绝，普通用户创建、编辑、禁用、删除、自助注销、自助注销二次确认拒绝、基础恢复、拒绝角色变更，用户分组创建、更新、删除，支付商品创建、更新、启用、禁用，支付订单创建、创建拒绝和取消拒绝，支付 webhook 入账、provider 明确失败通知、Stripe/易支付 provider 退款请求、Stripe 全额/部分退款和扣回、Stripe 争议事件记录和可选 API Key 禁用、支付人工补账/扣回、支付人工退款，settings 更新和校验拒绝，用户调额，充值码管理、创建拒绝和兑换拒绝，通道创建、编辑、启用、禁用、删除、测试和拉取模型，管理员账号创建、编辑、禁用、删除和超级管理员权限拒绝，以及日志清理和日志导出审计。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: action
          in: query
          required: false
          schema: { type: string }
          description: 动作过滤，例如 api_key.created、api_key.batch_disable_denied、api_key.batch_expire_denied、api_key.quota_limit_denied、user.create、user.self_cancel_denied、user_group.create、redem_code.create_denied、redem_code.redeem_denied、payment_product.create、model_price.create、channel_model_price.create、payment_order.create、payment_order.create_denied、payment_order.cancel_denied、payment_webhook.processed、payment_webhook.failed、payment_refund.requested、payment_refund.request_denied、payment_refund.deducted、payment_refund.manual、payment_refund.manual_denied、payment_dispute.created、payment_dispute.updated、payment_dispute.closed、payment_dispute.funds_changed、payment_manual_adjust.debit、payment_manual_adjust.denied、setting.denied、channel.update、log.clear、log.export 或 admin.denied。
        - name: resource_type
          in: query
          required: false
          schema: { type: string }
          description: 资源类型过滤，例如 api_key、user、user_group、payment_product、model_price、channel_model_price、payment_order、payment_event、channel、log 或 admin。
        - name: resource_id
          in: query
          required: false
          schema: { type: string }
          description: 资源 ID 过滤。
        - name: actor_user_id
          in: query
          required: false
          schema: { type: integer, format: uint64 }
          description: 操作人用户 ID 过滤。
        - name: result
          in: query
          required: false
          schema:
            type: string
            enum: [success, failed, denied]
          description: 审计结果过滤。
        - name: error_code
          in: query
          required: false
          schema: { type: string }
          description: 失败或拒绝 code 过滤，例如 api_key_quota_edit_forbidden、self_cancel_password_required、self_cancel_password_invalid、redem_code_expired_at_not_future、redem_code_invalid_or_used、redem_code_expired、payment_order_provider_disabled、payment_order_product_unavailable、payment_order_cancel_not_pending、payment_order_cancel_not_found、payment_refund_reason_required、payment_refund_idempotency_key_used、payment_manual_adjust_reason_required 或 payment_manual_refund_idempotency_key_used。
        - name: start_time
          in: query
          required: false
          schema: { type: integer, format: int64 }
          description: 起始 Unix 秒，按 created_at >= start_time 过滤。
        - name: end_time
          in: query
          required: false
          schema: { type: integer, format: int64 }
          description: 结束 Unix 秒，按 created_at <= end_time 过滤。
      responses:
        "200":
          description: 管理审计分页列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminAuditLogPage"
        "403":
          $ref: "#/components/responses/StandardForbidden"
