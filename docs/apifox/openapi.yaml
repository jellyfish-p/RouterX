            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentProviderRefundRequestResult"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
