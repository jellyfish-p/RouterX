openapi: 3.0.3
info:
  title: RouterX API
  version: 0.1.0
  description: |
    RouterX 后端 API 文档，供 Apifox 直接导入。

    本文件以当前 Go 路由注册和 docs/API.md 为准：
    - /v0/setup、/v0/user、/v0/admin 使用 RouterX 统一响应。
    - /v1 使用入口协议兼容响应，不包裹 success/data/message。
    - 支付、充值码、OAuth/OIDC 等目标扩展尚未注册，未放入本文件 paths。
servers:
  - url: http://localhost:3000
    description: Local backend
tags:
  - name: Health
    description: 健康检查与就绪检查。
  - name: Setup
    description: 首次初始化。
  - name: User Auth
    description: 注册、登录和个人资料。
  - name: User API Key
    description: 用户 API Key 生命周期。
  - name: User Usage
    description: 用户调用日志和账单统计。
  - name: Admin Users
    description: 管理员用户管理。
  - name: Admin Accounts
    description: 管理员账号管理。
  - name: Admin Channels
    description: 上游通道管理。
  - name: Admin Logs
    description: 全局日志、看板和设置。
  - name: OpenAI Compatible
    description: OpenAI-compatible /v1 入口。
  - name: Anthropic Compatible
    description: Anthropic-compatible /v1 入口。
  - name: Gemini Compatible
    description: Gemini-compatible /v1 入口。
paths:
  /health:
    get:
      tags: [Health]
      summary: 进程健康检查
      description: 不要求系统初始化或鉴权，只证明 HTTP 进程存活。
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      tags: [Health]
      summary: 服务就绪检查
      description: 检查数据库可用性；初始化后还会检查 JWT 配置。
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /v0/setup/status:
    get:
      tags: [Setup]
      summary: 查询初始化状态
      responses:
        "200":
          description: 初始化状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SetupStatus"
  /v0/setup/init:
    post:
      tags: [Setup]
      summary: 首次初始化超级管理员
      description: 仅未初始化时可调用；会创建超级管理员、本地身份和默认 settings。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInitRequest"
      responses:
        "200":
          description: 初始化成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "409":
          description: 已初始化
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
  /v0/user/register:
    post:
      tags: [User Auth]
      summary: 用户注册
      description: 当前基础实现为用户名密码注册；是否允许公开注册由 settings 控制。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserBrief"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/user/login:
    post:
      tags: [User Auth]
      summary: 用户统一登录
      description: 管理后台也使用本接口获取 User JWT，不提供独立 /v0/admin/login。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/user/self:
    get:
      tags: [User Auth]
      summary: 获取个人信息
      security:
        - UserJWT: []
      responses:
        "200":
          description: 当前登录用户
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserBrief"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
    put:
      tags: [User Auth]
      summary: 修改个人信息
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSelfRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/self/password:
    post:
      tags: [User Auth]
      summary: 修改登录密码
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/token:
    get:
      tags: [User API Key]
      summary: 当前用户 API Key 列表
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: API Key 分页列表，永不返回完整明文 key。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenPage"
    post:
      tags: [User API Key]
      summary: 创建 API Key
      description: 返回一次性 sk- 明文；有限额度 Key 创建时只设置预算上限，不扣用户余额，调用成功时再扣费。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "200":
          description: 创建成功，key 只在本次响应展示。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/user/token/{id}:
    put:
      tags: [User API Key]
      summary: 编辑 API Key
      description: 普通用户只能编辑名称、状态和过期时间，不能通过本接口修改额度或无限标记。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTokenRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "403":
          $ref: "#/components/responses/StandardForbidden"
        "404":
          $ref: "#/components/responses/StandardNotFound"
    delete:
      tags: [User API Key]
      summary: 删除 API Key
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/log:
    get:
      tags: [User Usage]
      summary: 当前用户调用日志
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/TokenID"
        - $ref: "#/components/parameters/ChannelID"
        - $ref: "#/components/parameters/Model"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: 当前用户自己的日志分页。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LogPage"
  /v0/user/billing:
    get:
      tags: [User Usage]
      summary: 当前用户账单统计
      description: 聚合成功调用日志中的 call_count、total_quota 和 total_tokens。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: 用户账单聚合。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BillingStats"
  /v0/admin/user:
    get:
      tags: [Admin Users]
      summary: 用户列表
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Role"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/GroupID"
      responses:
        "200":
          description: 用户分页列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserPage"
    post:
      tags: [Admin Users]
      summary: 创建普通用户
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: 创建成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserBrief"
        "403":
          $ref: "#/components/responses/StandardForbidden"
  /v0/admin/user/{id}:
    put:
      tags: [Admin Users]
      summary: 编辑普通用户
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "403":
          $ref: "#/components/responses/StandardForbidden"
    delete:
      tags: [Admin Users]
      summary: 删除普通用户
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "403":
          $ref: "#/components/responses/StandardForbidden"
  /v0/admin/user/{id}/quota:
    patch:
      tags: [Admin Users]
      summary: 调整用户额度
      description: quota 为增量；负数表示扣减，扣减时要求余额足够。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuotaRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/admin/admin:
    get:
      tags: [Admin Accounts]
      summary: 管理员列表
      description: 管理员及以上可查看。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 管理员分页列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserPage"
    post:
      tags: [Admin Accounts]
      summary: 创建管理员
      description: 仅超级管理员可创建管理员账号。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: 创建成功。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "403":
          $ref: "#/components/responses/StandardForbidden"
  /v0/admin/admin/{id}:
    put:
      tags: [Admin Accounts]
      summary: 编辑管理员
      description: 仅超级管理员；禁止越权编辑同级或破坏最后一个超级管理员。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "403":
          $ref: "#/components/responses/StandardForbidden"
    delete:
      tags: [Admin Accounts]
      summary: 删除管理员
      description: 仅超级管理员；删除时保护最后一个超级管理员。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "403":
          $ref: "#/components/responses/StandardForbidden"
  /v0/admin/channel:
    get:
      tags: [Admin Channels]
      summary: 通道列表
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: type
          in: query
          schema: { type: integer }
          description: 通道类型筛选。
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: 通道分页列表，密钥字段脱敏。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ChannelPage"
    post:
      tags: [Admin Channels]
      summary: 创建通道
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "200":
          description: 创建成功，返回脱敏通道信息。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ChannelInfo"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/admin/channel/{id}:
    put:
      tags: [Admin Channels]
      summary: 编辑通道
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
    delete:
      tags: [Admin Channels]
      summary: 删除通道
      description: 历史日志保留，但解除 channel_id 引用。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
  /v0/admin/channel/{id}/disable:
    patch:
      tags: [Admin Channels]
      summary: 禁用通道
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
  /v0/admin/channel/{id}/enable:
    patch:
      tags: [Admin Channels]
      summary: 启用通道
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
  /v0/admin/channel/{id}/test:
    post:
      tags: [Admin Channels]
      summary: 测试通道连通性
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: 通道测试结果。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TestChannelResult"
  /v0/admin/channel/{id}/models:
    get:
      tags: [Admin Channels]
      summary: 拉取上游模型列表
      description: 基础实现只支持单 base_url 通道。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: 上游模型列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FetchChannelModelsResult"
  /v0/admin/log:
    get:
      tags: [Admin Logs]
      summary: 全局调用日志
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/UserID"
        - $ref: "#/components/parameters/TokenID"
        - $ref: "#/components/parameters/ChannelID"
        - $ref: "#/components/parameters/Model"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: 全局日志分页。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LogPage"
    delete:
      tags: [Admin Logs]
      summary: 清理历史日志
      description: 需要 before 查询参数，删除该时间之前的日志。
      security:
        - UserJWT: []
      parameters:
        - name: before
          in: query
          required: true
          schema: { type: string, format: date-time }
          description: 删除此时间之前的日志。
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/admin/dashboard:
    get:
      tags: [Admin Logs]
      summary: 管理看板统计
      security:
        - UserJWT: []
      responses:
        "200":
          description: 看板统计。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DashboardStats"
  /v0/admin/setting:
    get:
      tags: [Admin Logs]
      summary: 获取系统设置
      description: 仅超级管理员；敏感值会脱敏。
      security:
        - UserJWT: []
      parameters:
        - name: category
          in: query
          schema: { type: string }
          description: 设置分类筛选。
      responses:
        "200":
          description: 设置列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Setting"
        "403":
          $ref: "#/components/responses/StandardForbidden"
    put:
      tags: [Admin Logs]
      summary: 批量更新系统设置
      description: 仅超级管理员。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchSetSettingsRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "403":
          $ref: "#/components/responses/StandardForbidden"
  /v1/responses:
    post:
      tags: [OpenAI Compatible]
      summary: OpenAI Responses API 转发
      description: OpenAI-compatible Responses 基础实现；JSON 请求体透传到上游 /v1/responses，发出前剥离 routerx 私有字段，并将 usage.input_tokens/output_tokens/total_tokens 映射到 RouterX 日志与扣费。完整 Responses 原生字段矩阵以 docs/PROTOCOLS.md 为准。
      security:
        - ApiKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OpenAI-compatible 响应。
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "4XX":
          $ref: "#/components/responses/OpenAIError"
        "5XX":
          $ref: "#/components/responses/OpenAIError"
  /v1/chat/completions:
    post:
      tags: [OpenAI Compatible]
      summary: OpenAI Chat Completions 转发
      description: P0 稳定闭环；支持非流式 JSON 响应和 OpenAI-compatible SSE 基础流式。本地限流读取 rate_limit.*，覆盖全局、IP 和 Token 分钟窗口，命中时返回 rate_limit_exceeded 且不调用上游。通道候选读取 relay.error_auto_ban 和 relay.error_ban_threshold，自动排除达到阈值的故障通道。非流式在 relay.retry_count > 0 时会对上游 429、5xx、网络错误、超时和响应读取失败换候选通道；400/401/403 不重试。stream=true 仅支持 OpenAI SSE 形态通道；命中 Anthropic/Gemini 等非 OpenAI SSE 通道时返回 unsupported_stream_channel。routerx.route 可在已允许候选通道内按分组、通道或 provider 收窄。
      security:
        - ApiKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: OpenAI-compatible Chat 响应；stream=true 时为 SSE。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                type: string
                description: "OpenAI-compatible SSE data chunks ending with data: [DONE]."
        "400":
          description: 请求体或 routerx 扩展非法；常见 code 包括 invalid_json、model_required、invalid_routerx_options、invalid_routerx_route。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "401":
          $ref: "#/components/responses/OpenAIError"
        "429":
          description: 余额不足、本地限流或上游限流。常见 code 包括 insufficient_quota、rate_limit_exceeded、upstream_429。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "502":
          description: 无可用通道或上游错误；routerx.route 筛选后无候选时返回 no_available_channel，非流式可重试错误在 relay.retry_count 耗尽后返回最后一次上游错误，stream=true 命中非 OpenAI SSE 通道时返回 unsupported_stream_channel。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "504":
          description: 上游调用超时，code 为 upstream_timeout。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
