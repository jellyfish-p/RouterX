openapi: 3.0.3
info:
  title: RouterX API
  version: 0.1.0
  description: |
    RouterX 后端 API 文档，供 Apifox 直接导入。

    本文件以当前 Go 路由注册和 docs/API.md 为准：
    - /v0/setup、/v0/user、/v0/admin 使用 RouterX 统一响应。
    - /v1 使用入口协议兼容响应，不包裹 success/data/message。
    - 充值码、API Key 生命周期审计、含 Relay 请求数、Relay 错误维度、通道可用状态、逐通道错误计数、限流拒绝、计费失败和审计事件计数的基础 /metrics、管理端支付商品、管理审计查询、用户侧支付商品/订单、Stripe webhook、易支付异步通知和易支付同步返回基础接口已注册；OAuth/OIDC 等目标扩展尚未注册，未放入本文件 paths。
servers:
  - url: http://localhost:3000
    description: Local backend
tags:
  - name: Health
    description: 健康检查与就绪检查。
  - name: Setup
    description: 首次初始化。
  - name: User Auth
    description: 注册、登录和个人资料。
  - name: User API Key
    description: 用户 API Key 生命周期。
  - name: User Usage
    description: 用户调用日志、账单统计、充值码和模型可见性。
  - name: User Payment
    description: 用户侧支付商品和订单。
  - name: Payment Webhook
    description: 支付 provider 异步通知。
  - name: Admin Users
    description: 管理员用户管理。
  - name: Admin Redem
    description: 管理员充值码管理。
  - name: Admin Audit
    description: 超级管理员管理审计查询。
  - name: Admin Payment
    description: 管理员支付商品管理。
  - name: Admin Accounts
    description: 管理员账号管理。
  - name: Admin Channels
    description: 上游通道管理。
  - name: Admin Logs
    description: 全局日志、看板和设置。
  - name: OpenAI Compatible
    description: OpenAI-compatible /v1 入口。
  - name: Anthropic Compatible
    description: Anthropic-compatible /v1 入口。
  - name: Gemini Compatible
    description: Gemini-compatible /v1 入口。
paths:
  /health:
    get:
      tags: [Health]
      summary: 进程健康检查
      description: 不要求系统初始化或鉴权，只证明 HTTP 进程存活。
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      tags: [Health]
      summary: 服务就绪检查
      description: 检查数据库可用性；初始化后还会检查 JWT 配置、关键 settings，以及已启用支付 provider 的必需环境密钥。
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus 指标
      description: 默认由 observability.metrics_enabled=false 关闭；启用后返回 Prometheus text/plain，包含实例、Relay 日志、Relay 请求数、Relay 错误维度、通道可用状态、逐通道错误计数、限流拒绝、计费失败、支付、审计和 DB/Redis 基础指标。
      responses:
        "200":
          description: Prometheus text format metrics.
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP routerx_users_total Total users.
                  # TYPE routerx_users_total gauge
                  routerx_users_total 1
                  # HELP routerx_logs_total Relay logs by status.
                  # TYPE routerx_logs_total counter
                  routerx_logs_total{status="success"} 42
                  # HELP routerx_quota_used_total Total quota recorded in relay logs.
                  # TYPE routerx_quota_used_total counter
                  routerx_quota_used_total 4200
                  # HELP routerx_payment_orders_total Payment orders by provider and status.
                  # TYPE routerx_payment_orders_total gauge
                  routerx_payment_orders_total{provider="stripe",status="paid"} 3
                  # HELP routerx_db_up Database ping status.
                  # TYPE routerx_db_up gauge
                  routerx_db_up 1
        "404":
          description: 指标接口未启用。
  /v0/setup/status:
    get:
      tags: [Setup]
      summary: 查询初始化状态
      responses:
        "200":
          description: 初始化状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SetupStatus"
  /v0/setup/init:
    post:
      tags: [Setup]
      summary: 首次初始化超级管理员
      description: 仅未初始化时可调用；会创建超级管理员、本地身份和默认 settings。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInitRequest"
      responses:
        "200":
          description: 初始化成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "409":
          description: 已初始化
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
  /v0/user/register:
    post:
      tags: [User Auth]
      summary: 用户注册
      description: 当前基础实现为用户名密码注册；是否允许公开注册由 settings 控制。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserBrief"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/user/login:
    post:
      tags: [User Auth]
      summary: 用户统一登录
      description: 管理后台也使用本接口获取 User JWT，不提供独立 /v0/admin/login。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/user/self:
    get:
      tags: [User Auth]
      summary: 获取个人信息
      security:
        - UserJWT: []
      responses:
        "200":
          description: 当前登录用户
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserBrief"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
    put:
      tags: [User Auth]
      summary: 修改个人信息
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSelfRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/self/password:
    post:
      tags: [User Auth]
      summary: 修改登录密码
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/token:
    get:
      tags: [User API Key]
      summary: 当前用户 API Key 列表
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: API Key 分页列表，永不返回完整明文 key。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenPage"
    post:
      tags: [User API Key]
      summary: 创建 API Key
      description: 返回一次性 sk- 明文；有限额度 Key 创建时只设置预算上限，不扣用户余额，调用成功时再扣费。成功后写入 api_key.created 管理审计，审计摘要不包含完整明文 Key 或哈希。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "200":
          description: 创建成功，key 只在本次响应展示。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/user/token/{id}:
    put:
      tags: [User API Key]
      summary: 编辑 API Key
      description: 普通用户只能编辑名称、状态和过期时间，不能通过本接口修改额度或无限标记。普通编辑成功后写 api_key.updated；将状态改为禁用写 api_key.disabled；尝试修改 remain_quota 或 unlimited 会返回 403 并写 api_key.quota_limit_denied。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTokenRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "403":
          $ref: "#/components/responses/StandardForbidden"
        "404":
          $ref: "#/components/responses/StandardNotFound"
    delete:
      tags: [User API Key]
      summary: 删除 API Key
      description: 软删除当前用户自己的 API Key；成功后写 api_key.deleted 管理审计，历史调用日志保留 token_id 引用。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/disable:
    post:
      tags: [User API Key]
      summary: 禁用 API Key
      description: 显式禁用当前用户自己的 API Key，可选记录禁用原因；成功后写 api_key.disabled 管理审计。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportTokenLeakRequest"
      responses:
        "200":
          description: 禁用成功，返回脱敏 Token 摘要。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Token"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/rotate:
    post:
      tags: [User API Key]
      summary: 轮换 API Key
      description: 创建替换 Key，复制名称、过期时间、预算语义和 scope，写入 rotated_from_id，禁用旧 Key；新 key 明文只在本次响应展示，成功后写 api_key.rotated 管理审计。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: 轮换成功，返回新 Key 摘要和一次性明文。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/report-leak:
    post:
      tags: [User API Key]
      summary: 上报 API Key 泄露
      description: 立即禁用当前用户自己的 API Key，记录 revoked_reason，返回替换建议；成功后写 api_key.leak_reported 管理审计，审计不包含明文 Key。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportTokenLeakRequest"
      responses:
        "200":
          description: 泄露上报成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ReportTokenLeakResponse"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/scope:
    put:
      tags: [User API Key]
      summary: 更新 API Key scope
      description: 更新当前用户自己的 API Key 收窄策略；当前支持 allow_models 模型 allow-list、api_types APIType allow-list、channel_groups 通道分组 allow-list、entry_protocols 入口协议 allow-list、ip_cidrs IP/CIDR allow-list、methods 方法路径 allow-list、daily_quota 日预算、monthly_quota 月预算、max_concurrency 并发上限、rpm 和 tpm。列表为空表示继承用户和系统策略；模型未命中返回 model_not_allowed，APIType、入口协议、IP 或方法路径未命中返回 token_forbidden，通道分组未命中返回 route_forbidden，日/月预算达到上限返回 insufficient_quota，并发上限或 RPM/TPM 命中返回 rate_limit_exceeded，且都不会调用上游。成功后写 api_key.scope_updated 管理审计，审计摘要不包含明文 Key 或哈希。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTokenScopeRequest"
      responses:
        "200":
          description: Scope 更新成功，返回脱敏 Token 摘要。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Token"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/usage:
    get:
      tags: [User API Key]
      summary: API Key 用量摘要
      description: 返回当前用户指定 Key 的调用数、成功/失败数、额度消耗、总 tokens 和最近调用摘要。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: 单 Key 用量摘要。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenUsage"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/log:
    get:
      tags: [User Usage]
      summary: 当前用户调用日志
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/TokenID"
        - $ref: "#/components/parameters/ChannelID"
        - $ref: "#/components/parameters/Model"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: 当前用户自己的日志分页。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LogPage"
  /v0/user/billing:
    get:
      tags: [User Usage]
      summary: 当前用户账单统计
      description: 聚合成功调用日志中的 call_count、total_quota 和 total_tokens。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: 用户账单聚合。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BillingStats"
  /v0/user/redem:
    post:
      tags: [User Usage]
      summary: 使用充值码
      description: 基础实现；兑换未使用充值码，事务内标记 redem_codes used/used_by/used_at、增加当前用户 quota，并写入 quota_transactions 幂等流水和 redem_code.redeem 管理审计。审计摘要只保存脱敏兑换码、额度、使用人和兑换后余额；充值码批次/备注/过期策略仍以 docs/PAYMENTS.md 后续契约为准。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemCodeRequest"
      responses:
        "200":
          description: 兑换成功，返回本次增加额度和当前余额。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RedeemCodeResult"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/models:
    get:
      tags: [User Usage]
      summary: 当前用户可用模型
      description: 基础实现；返回启用通道暴露的去重模型列表。价格表和访问控制规则尚未接入时，price_rule 为 minimum_usage 且 pricing_ready=false。
      security:
        - UserJWT: []
      responses:
        "200":
          description: 当前可见模型列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserModelListResult"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/payment/products:
    get:
      tags: [User Payment]
      summary: 充值商品列表
      description: 返回当前启用的服务端充值商品。quota 为 base_quota + bonus_quota，客户端不能直接指定入账额度。
      security:
        - UserJWT: []
      responses:
        "200":
          description: 可购买商品列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PaymentProductInfo"
  /v0/user/payment/orders:
    post:
      tags: [User Payment]
      summary: 创建支付订单
      description: 基础实现；provider 必须已通过 payment.stripe.enabled 或 payment.epay.enabled 启用。创建本地 pending 订单并保存商品快照，按 payment.order_expire_minutes 生成 expires_at，成功后写 payment_order.create 管理审计；审计摘要不保存 checkout_url。易支付网关、商户号、回调 URL 和 PAYMENT_EPAY_KEY 配置齐全时返回签名收银台 URL，否则返回安全 checkout 占位链接。真实 Stripe Checkout Session 创建仍按 docs/PAYMENTS.md 后续契约实现。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentOrderRequest"
      responses:
        "200":
          description: 订单创建成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderInfo"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
    get:
      tags: [User Payment]
      summary: 当前用户支付订单列表
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 当前用户订单分页。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderPage"
  /v0/user/payment/orders/{order_no}:
    get:
      tags: [User Payment]
      summary: 当前用户支付订单详情
      security:
        - UserJWT: []
      parameters:
        - name: order_no
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 当前用户订单详情。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderInfo"
        "404":
          description: 订单不存在或不属于当前用户。
  /v0/payment/stripe/webhook:
    post:
      tags: [Payment Webhook]
      summary: Stripe Webhook 异步通知
      description: 基础实现；使用 PAYMENT_STRIPE_WEBHOOK_SECRET 校验 Stripe-Signature 原始 body 签名。checkout.session.completed 且 payment_status=paid 时校验 metadata.order_no、metadata.product_id、metadata.user_id、amount_total 和 currency，成功事件会写 payment_events、将 pending 订单置为 paid、写 quota_transactions 并增加用户额度。charge.refunded 全额退款事件会校验金额和币种，将 paid 订单置为 refunded；payment.refund.auto_deduct=true 时写 refund_deduct 流水并扣回额度。重复事件幂等返回 success。
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
          description: Stripe webhook 签名 header，格式包含 t 和 v1。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeWebhookEvent"
      responses:
        "200":
          description: provider 通知已接受；响应体为纯文本 success。
          content:
            text/plain:
              schema:
                type: string
                example: success
        "400":
          description: 签名、事件、订单、金额、币种或 metadata 校验失败；响应体为纯文本 fail。
          content:
            text/plain:
              schema:
                type: string
                example: fail
  /v0/payment/epay/notify:
    post:
      tags: [Payment Webhook]
      summary: 易支付异步通知
      description: 基础实现；使用 PAYMENT_EPAY_KEY 校验 MD5 签名，校验 out_trade_no、money 和成功状态。成功事件会写 payment_events、将 pending 订单置为 paid、写 quota_transactions 并增加用户额度；重复通知幂等返回 success。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/EpayNotifyRequest"
      responses:
        "200":
          description: provider 通知已接受；响应体为纯文本 success。
          content:
            text/plain:
              schema:
                type: string
                example: success
        "400":
          description: 签名、订单、金额或状态校验失败；响应体为纯文本 fail。
          content:
            text/plain:
              schema:
                type: string
                example: fail
  /v0/payment/epay/return:
    get:
      tags: [Payment Webhook]
      summary: 易支付同步返回只读状态
      description: 基础实现；同步返回只读取 RouterX 本地订单状态，不校验为支付成功依据，不写 payment_events，不增加用户额度。入账只依赖易支付异步通知。
      parameters:
        - name: out_trade_no
          in: query
          required: false
          schema: { type: string }
          description: 易支付返回的 RouterX 本地订单号。
        - name: order_no
          in: query
          required: false
          schema: { type: string }
          description: 等价查询参数；当 out_trade_no 为空时使用。
      responses:
        "200":
          description: 本地订单状态。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderInfo"
        "404":
          description: 订单不存在或不是易支付订单。
