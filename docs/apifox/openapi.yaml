              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/RedemCodeInfo"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
