            application/json:
              schema:
                type: object
                additionalProperties: true
        "4XX":
          $ref: "#/components/responses/OpenAIError"
        "5XX":
          $ref: "#/components/responses/OpenAIError"
  /v1/chat/completions:
    post:
      tags: [OpenAI Compatible]
      summary: OpenAI Chat Completions 转发
      description: P0 稳定闭环；支持非流式 JSON 响应和 OpenAI-compatible SSE 基础流式。本地限流读取 rate_limit.*，覆盖全局、IP 和 Token 分钟窗口；API Key max_concurrency 可限制同一 Key 同时在途请求，rpm/tpm 可限制同一 Key 每分钟请求和模型 token，命中时返回 rate_limit_exceeded 且不调用上游。通道候选读取 relay.error_auto_ban 和 relay.error_ban_threshold，自动排除达到阈值的故障通道。非流式在 relay.retry_count > 0 时会对上游 429、5xx、网络错误、超时和响应读取失败换候选通道；400/401/403 不重试。stream=true 仅支持 OpenAI SSE 形态通道；命中 Anthropic/Gemini 等非 OpenAI SSE 通道时返回 unsupported_stream_channel。routerx.route 可在已允许候选通道内按分组、通道或 provider 收窄。
      security:
        - ApiKeyBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: OpenAI-compatible Chat 响应；stream=true 时为 SSE。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                type: string
                description: "OpenAI-compatible SSE data chunks ending with data: [DONE]."
        "400":
          description: 请求体或 routerx 扩展非法；常见 code 包括 invalid_json、model_required、invalid_routerx_options、invalid_routerx_route。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "401":
          $ref: "#/components/responses/OpenAIError"
        "403":
          description: API Key scope 或访问策略拒绝；模型 allow-list 未命中时 code 为 model_not_allowed，APIType、入口协议、IP/CIDR 或方法路径 allow-list 未命中时 code 为 token_forbidden，API Key 通道分组 allow-list 或用户分组通道分组访问控制未命中时 code 为 route_forbidden。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "429":
          description: 余额不足、API Key 日/月预算达到上限、API Key 并发或 RPM/TPM 上限、本地限流或上游限流。常见 code 包括 insufficient_quota、rate_limit_exceeded、upstream_429。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "502":
          description: 无可用通道或上游错误；routerx.route 筛选后无候选时返回 no_available_channel，非流式可重试错误在 relay.retry_count 耗尽后返回最后一次上游错误，stream=true 命中非 OpenAI SSE 通道时返回 unsupported_stream_channel。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
        "504":
          description: 上游调用超时，code 为 upstream_timeout。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIErrorEnvelope"
