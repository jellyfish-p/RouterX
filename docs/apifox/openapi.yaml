        stream:
          type: boolean
          description: true 时返回 OpenAI-compatible SSE；当前仅支持 OpenAI SSE 形态通道。
        stop:
          type: array
          items: { type: string }
        max_tokens: { type: integer, nullable: true }
        presence_penalty: { type: number, format: double, nullable: true }
        frequency_penalty: { type: number, format: double, nullable: true }
        user: { type: string }
        routerx:
          type: object
          description: RouterX 私有扩展字段；普通 OpenAI-compatible 上游不会透传。OpenAI-compatible Chat 命中 Gemini 上游时，可通过 provider.gemini.safetySettings 传递 Gemini 原生安全设置。
          properties:
            route:
              $ref: "#/components/schemas/RouterXRoutePreference"
            upstream:
              $ref: "#/components/schemas/RouterXUpstreamOptions"
            provider:
              $ref: "#/components/schemas/RouterXProviderOptions"
          additionalProperties: true
    RouterXRoutePreference:
      type: object
      description: 请求级路由偏好，只会在管理员已允许的候选通道内继续收窄，未知字段会被忽略。
      properties:
        channel_group: { type: string, description: 按通道分组收窄候选。 }
        group: { type: string, description: channel_group 的兼容别名。 }
        channel_id:
          oneOf:
            - { type: integer, format: uint64 }
            - { type: string }
          description: 指定目标通道 ID。
        channel: { type: string, description: 指定目标通道名称。 }
        channel_name: { type: string, description: channel 的兼容别名。 }
        provider: { type: string, description: 指定上游 provider，例如 openai、openai-compatible、anthropic、gemini、qwen、deepseek、xai、routerx。 }
        upstream_provider: { type: string, description: provider 的兼容别名。 }
        disabled_providers:
          type: array
          items: { type: string }
          description: 从候选集中排除指定 provider。
      additionalProperties: true
    RouterXUpstreamOptions:
      type: object
      description: 上游请求补充参数；只补充安全 header/query 和 JSON body 缺省字段，不覆盖通道密钥、provider API key、Content-Type、model、stream、routerx 或原请求已存在字段。
      properties:
        headers:
          type: object
          additionalProperties: { type: string }
          description: 额外上游 header；Authorization、Cookie、Set-Cookie、X-Api-Key、api-key、Content-Type、X-RouterX-* 等敏感/内部字段会被忽略。
          example:
            X-Upstream-Feature: beta
        query:
          type: object
          additionalProperties: { type: string }
          description: 额外上游 query；key、api_key、apikey、access_token 等常见鉴权参数会被忽略，适配器已设置的 query 不会被覆盖。
          example:
            trace: enabled
        body:
          type: object
          additionalProperties: true
          description: 额外 JSON body 字段；仅在原请求不存在该字段时合并，model、routerx、stream 会被忽略。
          example:
            reasoning_effort: high
      additionalProperties: true
    RouterXProviderOptions:
      type: object
      description: provider 专属 JSON body 补充参数；仅在最终选中的上游 provider 匹配时合并，provider 专属补充值优先于通用 upstream.body，但仍不覆盖原请求已有字段、model、routerx 或 stream。OpenAI-compatible Chat 命中 Gemini 上游时，gemini.safetySettings 会映射到 Gemini 原生 safetySettings；Gemini generateContent 原生入口命中 Gemini 上游时也会只向 Gemini 上游保留原生生成字段。
      properties:
        openai:
          $ref: "#/components/schemas/RouterXProviderBody"
        anthropic:
          $ref: "#/components/schemas/RouterXProviderBody"
        gemini:
          allOf:
            - $ref: "#/components/schemas/RouterXProviderBody"
          description: Gemini 上游专属补充；OpenAI-compatible Chat 会把 safetySettings 映射为 Gemini 原生 safetySettings。Gemini generateContent 原生入口命中 Gemini 上游时会保留 contents、systemInstruction、generationConfig、safetySettings、tools、toolConfig 和 cachedContent。
          example:
            safetySettings:
              - category: HARM_CATEGORY_DANGEROUS_CONTENT
                threshold: BLOCK_ONLY_HIGH
        xai:
          allOf:
            - $ref: "#/components/schemas/RouterXProviderBody"
          example:
            search_parameters:
              mode: auto
      additionalProperties:
        $ref: "#/components/schemas/RouterXProviderBody"
    RouterXProviderBody:
      type: object
      additionalProperties: true
      description: 匹配 provider 后补充到 JSON body 的字段；model、routerx、stream 和原请求已存在字段不会被覆盖。
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
    ChatCompletionResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string, example: chat.completion }
        created: { type: integer, format: int64 }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message:
                $ref: "#/components/schemas/ChatMessage"
              finish_reason: { type: string }
        usage:
          $ref: "#/components/schemas/Usage"
    Usage:
      type: object
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
    OpenAIErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            message: { type: string }
            type: { type: string }
            code: { type: string }
    AnthropicErrorEnvelope:
      type: object
      properties:
        type:
          type: string
          example: error
        error:
          type: object
          properties:
            type:
              type: string
              example: authentication_error
            message:
              type: string
              example: invalid api key
    GeminiErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              example: 401
            message:
              type: string
              example: invalid api key
            status:
              type: string
              example: UNAUTHENTICATED
    OpenAIModelList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/OpenAIModel"
    OpenAIModel:
      type: object
      properties:
        id: { type: string }
        object: { type: string, example: model }
        created: { type: integer }
        owned_by: { type: string }
    GeminiModelList:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/GeminiModel"
    GeminiModel:
      type: object
      properties:
        name: { type: string, example: models/gpt-4o-mini }
        version: { type: string }
        displayName: { type: string, example: gpt-4o-mini }
        supportedGenerationMethods:
          type: array
          items:
            type: string
            enum:
              - generateContent
              - streamGenerateContent
              - countTokens
              - embedContent
              - batchEmbedContents
          example: [generateContent, streamGenerateContent, countTokens, embedContent, batchEmbedContents]
    AnthropicModelList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicModel"
        has_more: { type: boolean }
    AnthropicModel:
      type: object
      properties:
        id: { type: string, example: claude-3-5-sonnet }
        type: { type: string, example: model }
        display_name: { type: string, example: claude-3-5-sonnet }
    AnthropicMessageRequest:
      type: object
      required: [model, messages]
      description: Anthropic-compatible Messages 请求；命中 Anthropic 上游时会保留列出的原生字段，命中 OpenAI-compatible 上游时会转换为 Chat 主链路并记录不可保真的字段降级。
      properties:
        model: { type: string }
        system:
          description: string 或 Anthropic system content blocks；命中 Anthropic 上游时按原生字段保留，命中 OpenAI-compatible 上游时文本合并为 system message。
        messages:
          type: array
          items:
            type: object
            properties:
              role: { type: string, enum: [user, assistant] }
              content:
                description: string 或 Anthropic content blocks；命中 Anthropic 上游时原样保留 content blocks，命中 OpenAI-compatible 上游时非文本 block 会 compact JSON 文本化并写降级摘要。
        max_tokens: { type: integer }
        temperature: { type: number }
        top_p: { type: number }
        top_k: { type: integer }
        stop_sequences:
          type: array
          items: { type: string }
        stream: { type: boolean }
        tools:
          type: array
          description: Anthropic tools；命中 Anthropic 上游时原生保留，命中 OpenAI-compatible 上游时当前记录 dropped 降级摘要。
          items:
            type: object
            additionalProperties: true
        tool_choice:
          type: object
          additionalProperties: true
          description: Anthropic tool_choice；命中 Anthropic 上游时原生保留。
        thinking:
          type: object
          additionalProperties: true
          description: Anthropic thinking 配置；命中 Anthropic 上游时原生保留。
        metadata:
          type: object
          additionalProperties: true
          description: Anthropic metadata；命中 Anthropic 上游时原生保留。
    AnthropicMessageResponse:
      type: object
      properties:
        id: { type: string }
        type: { type: string, example: message }
        role: { type: string, example: assistant }
        model: { type: string }
        content:
          type: array
          items:
            type: object
            additionalProperties: true
        stop_reason: { type: string }
        stop_sequence:
          nullable: true
        usage:
          type: object
          properties:
            input_tokens: { type: integer }
            output_tokens: { type: integer }
