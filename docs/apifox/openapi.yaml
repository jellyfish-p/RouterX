        - $ref: "#/components/parameters/PageSize"
        - name: user_id
          in: query
          required: false
          schema: { type: integer, format: uint64 }
          description: 按所属用户过滤。
        - name: window_hours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
          description: 风险聚合窗口，单位小时；最大 720 小时。
        - name: min_error_count
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
            default: 3
          description: 窗口内失败次数达到该值时标记 error_spike。
        - name: low_quota_below
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
            default: 100
          description: 有限额度 Key 剩余额度小于等于该值时标记 low_quota。
