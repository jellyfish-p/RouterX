components:
  securitySchemes:
    UserJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: /v0/user 和 /v0/admin 使用的用户登录态。
    ApiKeyBearer:
      type: http
      scheme: bearer
      description: /v1 模型接口使用 sk- API Key。
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: uint64 }
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    Keyword:
      name: keyword
      in: query
      schema: { type: string }
    Role:
      name: role
      in: query
      schema: { type: integer }
      description: 1=user, 10=admin, 100=super admin。
    Status:
      name: status
      in: query
      schema: { type: integer }
    GroupID:
      name: group_id
      in: query
      schema: { type: integer, format: uint64 }
    UserID:
      name: user_id
      in: query
      schema: { type: integer, format: uint64 }
    TokenID:
      name: token_id
      in: query
      schema: { type: integer, format: uint64 }
    ChannelID:
      name: channel_id
      in: query
      schema: { type: integer, format: uint64 }
    Model:
      name: model
      in: query
      schema: { type: string }
    StartTime:
      name: start_time
      in: query
      schema: { type: string, format: date-time }
    EndTime:
      name: end_time
      in: query
      schema: { type: string, format: date-time }
  requestBodies:
    GenericJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    AudioMultipart:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [model, file]
            properties:
              model:
                type: string
                description: OpenAI-compatible 音频模型名；RouterX 使用该值选择通道。
                example: whisper-1
              file:
                type: string
                format: binary
                description: 音频文件字段。
              prompt:
                type: string
                description: 可选上下文提示词。
              response_format:
                type: string
                enum: [json, text, srt, verbose_json, vtt]
              language:
                type: string
                description: 转写语言；翻译接口可忽略。
              temperature:
                type: number
                format: float
              timestamp_granularities:
                type: array
                items:
                  type: string
                  enum: [word, segment]
              routerx:
                type: string
                description: RouterX 私有 JSON 字符串，例如 {"route":{"channel_group":"premium"}}；发往真实上游前会被剥离。
    ImageMultipart:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [model, image]
            properties:
              model:
                type: string
                description: OpenAI-compatible 图像模型名；RouterX 使用该值选择通道。
                example: gpt-image-1
              image:
                type: string
                format: binary
                description: 输入图像文件字段。
              mask:
                type: string
                format: binary
                description: 图像编辑可选遮罩文件字段；变体接口可忽略。
              prompt:
                type: string
                description: 图像编辑提示词；变体接口可忽略。
              n:
                type: integer
                minimum: 1
              size:
                type: string
                example: 1024x1024
              response_format:
                type: string
                enum: [url, b64_json]
              user:
                type: string
              routerx:
                type: string
                description: RouterX 私有 JSON 字符串，例如 {"route":{"channel_group":"premium"}}；发往真实上游前会被剥离。
  responses:
    StandardOK:
      description: 成功。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardBadRequest:
      description: 参数或业务错误。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardUnauthorized:
      description: 未登录或登录已过期。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardForbidden:
      description: 权限不足。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardNotFound:
      description: 资源不存在。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    OpenAIError:
      description: OpenAI-compatible /v1 错误。本地限流返回 rate_limit_error + rate_limit_exceeded。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenAIErrorEnvelope"
    AnthropicError:
      description: Anthropic-compatible 错误。本地限流返回 type=rate_limit_error。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AnthropicErrorEnvelope"
    GeminiError:
      description: Gemini-compatible 错误。本地限流返回 status=RESOURCE_EXHAUSTED。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorEnvelope"
    GenericJSON:
      description: JSON response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  schemas:
    StandardResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
      required: [success]
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        database:
          type: string
          nullable: true
        jwt:
          type: string
          nullable: true
    SetupStatus:
      type: object
      properties:
        initialized:
          type: boolean
    SetupInitRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          minLength: 6
          maxLength: 128
        display_name:
          type: string
        email:
          type: string
          format: email
    RegisterRequest:
      allOf:
        - $ref: "#/components/schemas/SetupInitRequest"
    LoginRequest:
      type: object
      required: [password]
      properties:
        account:
          type: string
          description: 用户名、邮箱或其他统一账号标识。
        username:
          type: string
          description: 兼容旧客户端。
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: User JWT。
        user:
          $ref: "#/components/schemas/UserBrief"
    UserBrief:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        username: { type: string }
        display_name: { type: string }
        email: { type: string }
        role: { type: integer, description: "1=user, 10=admin, 100=super admin" }
        quota: { type: integer, format: int64 }
        status: { type: integer }
        group_id: { type: integer, format: uint64, nullable: true }
    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 64 }
        password: { type: string, minLength: 6, maxLength: 128 }
        display_name: { type: string }
        email: { type: string }
        role: { type: integer }
        quota: { type: integer, format: int64 }
        group_id: { type: integer, format: uint64, nullable: true }
    UpdateUserRequest:
      type: object
      properties:
        display_name: { type: string }
        email: { type: string }
        role: { type: integer, nullable: true }
        status: { type: integer, nullable: true }
        group_id: { type: integer, format: uint64, nullable: true }
    UpdateSelfRequest:
      type: object
      properties:
        display_name: { type: string }
        email: { type: string }
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string }
        new_password: { type: string, minLength: 6 }
    UpdateQuotaRequest:
      type: object
      required: [quota]
      properties:
        quota:
          type: integer
          format: int64
          description: 额度增量；负数表示扣减。
    PaginatedResult:
      type: object
      properties:
        total: { type: integer, format: int64 }
        page: { type: integer }
        page_size: { type: integer }
        data:
          type: array
          items: {}
    UserPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserBrief"
    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 64 }
        remain_quota:
          type: integer
          format: int64
          description: 有限 Key 的预算上限；0 表示无可用预算。
        unlimited:
          type: boolean
          description: true 时 remain_quota 为 -1，调用仍扣用户余额。
        expired_at:
          type: integer
          format: int64
          nullable: true
          description: Unix 秒时间戳。
    UpdateTokenRequest:
      type: object
      properties:
        name: { type: string }
        status: { type: integer, nullable: true }
        expired_at: { type: integer, format: int64, nullable: true }
        remain_quota:
          type: integer
          format: int64
          nullable: true
          deprecated: true
          description: 用户编辑接口不允许修改额度；传入会返回 403。
        unlimited:
          type: boolean
          nullable: true
          deprecated: true
          description: 用户编辑接口不允许修改无限标记；传入会返回 403。
    Token:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        user_id: { type: integer, format: uint64 }
        name: { type: string }
        status: { type: integer }
        expired_at: { type: string, format: date-time, nullable: true }
        remain_quota: { type: integer, format: int64 }
        unlimited: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateTokenResponse:
      allOf:
        - $ref: "#/components/schemas/Token"
        - type: object
          properties:
            key:
              type: string
              example: sk-xxxxxxxx
              description: 只在创建响应出现一次。
    TokenPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Token"
    ChannelUpstreamRequest:
      type: object
      properties:
        base_url: { type: string }
        api_key: { type: string }
    ChannelUpstreamPublic:
      type: object
      properties:
        base_url: { type: string }
        has_api_key: { type: boolean }
    CreateChannelRequest:
      type: object
      required: [type, name, models]
      properties:
        idx: { type: integer }
        type: { type: integer, minimum: 1 }
        name: { type: string, maxLength: 64 }
        models:
          type: string
          description: 逗号分隔模型名，* 表示匹配所有模型。
        base_url: { type: string }
        base_urls:
          type: array
          items: { type: string }
        api_key:
          type: string
          writeOnly: true
        api_keys:
          type: array
          items: { type: string }
          writeOnly: true
        key_selection_mode:
          type: string
          enum: [round_robin, random]
        upstreams:
          type: array
          items:
            $ref: "#/components/schemas/ChannelUpstreamRequest"
        model_rewrites:
          type: object
          additionalProperties: { type: string }
        group:
          type: string
        upstream_options:
          type: object
          additionalProperties: true
        priority: { type: integer }
        weight: { type: integer }
        status: { type: integer }
    UpdateChannelRequest:
      allOf:
        - $ref: "#/components/schemas/CreateChannelRequest"
    ChannelInfo:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        idx: { type: integer }
        type: { type: integer }
        name: { type: string }
        models: { type: string }
        base_url: { type: string }
        base_urls:
          type: array
          items: { type: string }
        key_selection_mode: { type: string }
        api_key_count: { type: integer }
        upstreams:
          type: array
          items:
            $ref: "#/components/schemas/ChannelUpstreamPublic"
        model_rewrites:
          type: object
          additionalProperties: true
        group: { type: string }
        upstream_options:
          type: object
          additionalProperties: true
        priority: { type: integer }
        weight: { type: integer }
        status: { type: integer }
        response_ms: { type: integer }
        balance: { type: integer, format: int64 }
        error_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ChannelPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ChannelInfo"
    TestChannelResult:
      type: object
      properties:
        success: { type: boolean }
        response_ms: { type: integer, format: int64 }
        error: { type: string }
        model_count: { type: integer }
    FetchChannelModelsResult:
      type: object
      properties:
        models:
          type: array
          items: { type: string }
    Log:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        user_id: { type: integer, format: uint64 }
        token_id: { type: integer, format: uint64, nullable: true }
        channel_id: { type: integer, format: uint64, nullable: true }
        model: { type: string }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
        quota_used: { type: integer, format: int64 }
        status: { type: integer, description: "1=success, 2=failed" }
        error_msg: { type: string }
        ip: { type: string }
        created_at: { type: string, format: date-time }
    LogPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Log"
    BillingStats:
      type: object
      properties:
        call_count: { type: integer, format: int64 }
        total_quota: { type: integer, format: int64 }
        total_tokens: { type: integer, format: int64 }
    DashboardStats:
      type: object
      properties:
        user_count: { type: integer, format: int64 }
        channel_count: { type: integer, format: int64 }
        token_count: { type: integer, format: int64 }
        today_call_count: { type: integer, format: int64 }
        today_quota_used: { type: integer, format: int64 }
        active_channel_count: { type: integer, format: int64 }
    Setting:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        key: { type: string }
        value: { type: string }
        type: { type: string }
        category: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    BatchSetSettingsRequest:
      type: object
      properties:
        settings:
          type: object
          additionalProperties:
            type: string
      additionalProperties: true
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        temperature: { type: number, format: double, nullable: true }
        top_p: { type: number, format: double, nullable: true }
        n: { type: integer, nullable: true }
        stream:
          type: boolean
          description: true 时返回 OpenAI-compatible SSE；当前仅支持 OpenAI SSE 形态通道。
        stop:
          type: array
          items: { type: string }
        max_tokens: { type: integer, nullable: true }
        presence_penalty: { type: number, format: double, nullable: true }
        frequency_penalty: { type: number, format: double, nullable: true }
        user: { type: string }
        routerx:
          type: object
          description: RouterX 私有扩展字段；普通 OpenAI-compatible 上游不会透传。
          properties:
            route:
              $ref: "#/components/schemas/RouterXRoutePreference"
          additionalProperties: true
    RouterXRoutePreference:
      type: object
      description: 请求级路由偏好，只会在管理员已允许的候选通道内继续收窄，未知字段会被忽略。
      properties:
        channel_group: { type: string, description: 按通道分组收窄候选。 }
        group: { type: string, description: channel_group 的兼容别名。 }
        channel_id:
          oneOf:
            - { type: integer, format: uint64 }
            - { type: string }
          description: 指定目标通道 ID。
        channel: { type: string, description: 指定目标通道名称。 }
        channel_name: { type: string, description: channel 的兼容别名。 }
        provider: { type: string, description: 指定上游 provider，例如 openai、openai-compatible、anthropic、gemini、qwen、deepseek、xai、routerx。 }
        upstream_provider: { type: string, description: provider 的兼容别名。 }
        disabled_providers:
          type: array
          items: { type: string }
          description: 从候选集中排除指定 provider。
      additionalProperties: true
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
    ChatCompletionResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string, example: chat.completion }
        created: { type: integer, format: int64 }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message:
                $ref: "#/components/schemas/ChatMessage"
              finish_reason: { type: string }
        usage:
          $ref: "#/components/schemas/Usage"
    Usage:
      type: object
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
    OpenAIErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            message: { type: string }
            type: { type: string }
            code: { type: string }
    AnthropicErrorEnvelope:
      type: object
      properties:
        type:
          type: string
          example: error
        error:
          type: object
          properties:
            type:
              type: string
              example: authentication_error
            message:
              type: string
              example: invalid api key
    GeminiErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              example: 401
            message:
              type: string
              example: invalid api key
            status:
              type: string
              example: UNAUTHENTICATED
    OpenAIModelList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/OpenAIModel"
    OpenAIModel:
      type: object
      properties:
        id: { type: string }
        object: { type: string, example: model }
        created: { type: integer }
        owned_by: { type: string }
    GeminiModelList:
      type: object
      properties:
        models:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              version: { type: string }
              displayName: { type: string }
              supportedGenerationMethods:
                type: array
                items: { type: string }
    AnthropicModelList:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              type: { type: string }
              display_name: { type: string }
        has_more: { type: boolean }
    AnthropicMessageRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string }
        system: {}
        messages:
          type: array
          items:
            type: object
            properties:
              role: { type: string, enum: [user, assistant] }
              content: {}
        max_tokens: { type: integer }
        temperature: { type: number }
        top_p: { type: number }
        stop_sequences:
          type: array
          items: { type: string }
        stream: { type: boolean }
    AnthropicMessageResponse:
      type: object
      properties:
        id: { type: string }
        type: { type: string, example: message }
        role: { type: string, example: assistant }
        model: { type: string }
        content:
          type: array
          items:
            type: object
            additionalProperties: true
        stop_reason: { type: string }
        stop_sequence:
          nullable: true
        usage:
          type: object
          properties:
            input_tokens: { type: integer }
            output_tokens: { type: integer }
