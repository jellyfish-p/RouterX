      description: |
        当前实现会转换到 OpenAI-compatible Chat 主链路，再返回 Anthropic-compatible message response。
        命中 Anthropic 上游时，会保留 system/messages/max_tokens/metadata/stop_sequences/stream/temperature/top_p/top_k/tools/tool_choice/thinking 等原生 Messages 白名单字段；命中 OpenAI-compatible 上游时，文本 content 保留，非文本 content blocks 会以 compact JSON 文本降级并写入 request_snapshot.adapter_degradations。
        stream=true 命中 OpenAI-compatible SSE 上游时会将 OpenAI data chunk 转为 Anthropic SSE 事件；命中 Anthropic 上游时会调用 `/v1/messages`、透传原生 Anthropic SSE，并从 message_start/message_delta usage 提取扣费日志。完整 SDK 行为和 usage fallback 以 docs/PROTOCOLS.md 为准。
        API Key、配额、本地限流、路由和基础下游错误均返回 Anthropic-compatible error envelope；本地限流 type 为 rate_limit_error。
