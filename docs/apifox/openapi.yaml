              description: attachment; filename="routerx-logs.csv"
          content:
            text/csv:
              schema:
                type: string
              example: |
                id,user_id,token_id,channel_id,model,prompt_tokens,completion_tokens,total_tokens,usage_source,quota_used,status,error_code,error_source,upstream_status,request_id,created_at
                42,1,8,3,gpt-4o-mini,10,20,30,upstream,30,1,,,0,req_abc,2026-06-17T08:30:00Z
        "400":
          $ref: "#/components/responses/StandardBadRequest"
