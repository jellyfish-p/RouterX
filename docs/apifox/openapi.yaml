          in: query
          required: false
          schema: { type: string }
          description: 按充值码批次号精确过滤。
      responses:
        "200":
          description: 充值码分页列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RedemCodePage"
    post:
      tags: [Admin Redemption]
      summary: 生成或导入充值码
      description: codes 为空时按 count 生成随机充值码；codes 非空时导入指定充值码。count 默认 1，单次最多 100。可写入 batch_no、note 和未来 expired_at；成功后按每个充值码写入 redem_code.create 管理审计；过期时间非法、额度非法、数量超限、重复码等本地拒绝会写 redem_code.create_denied，error_code 包含 redem_code_expired_at_not_future、redem_code_quota_invalid、redem_code_count_exceeds_limit 或 redem_code_already_exists，摘要只保存脱敏 codes。
      security:
        - UserJWT: []
