      description: 管理员按日志查询条件导出脱敏 CSV；配置 LOG_SQL_DSN 时优先读取独立日志数据库，查询失败时回退主库事实。CSV 只包含安全运营字段，不包含请求体、响应体、IP、错误原文、request/policy/route/billing snapshot、API Key、上游密钥或支付密钥；成功后写入 log.export 管理审计，摘要记录过滤条件、规范化后的 limit 和 exported_count。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/UserID"
        - $ref: "#/components/parameters/TokenID"
        - $ref: "#/components/parameters/ChannelID"
        - $ref: "#/components/parameters/Model"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/ErrorCode"
        - $ref: "#/components/parameters/ErrorSource"
        - $ref: "#/components/parameters/UpstreamStatus"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
        - name: limit
          in: query
