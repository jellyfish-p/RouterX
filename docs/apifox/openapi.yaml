        Gin 当前注册为 /v1/models/:model，可匹配 gemini-pro:generateContent 这一类单段路径。
        命中 OpenAI-compatible 上游时会转换到 Chat 主链路，再返回 Gemini-compatible response；contents/systemInstruction 中的 text part 保留，非文本 parts 会以 compact JSON 文本降级。
        OpenAI-compatible 上游路径中，generationConfig.maxOutputTokens、temperature、topP、stopSequences 会映射到 OpenAI-compatible 字段；其他有值子字段会写入 request_snapshot.adapter_degradations 的 dropped 降级摘要。
        命中 Gemini 上游时，会以原生 Gemini body 保留 contents、systemInstruction、generationConfig、safetySettings、tools、toolConfig 和 cachedContent，不发送 OpenAI messages/max_tokens；成功日志保留 ingress_protocol=gemini，且不会把这些已保真字段误记为 dropped。
        API Key、配额、本地限流、路由和基础下游错误均返回 Gemini-compatible error envelope；本地限流 status 为 RESOURCE_EXHAUSTED。
      security:
        - ApiKeyBearer: []
      parameters:
        - $ref: "#/components/parameters/RouterXOptions"
        - $ref: "#/components/parameters/RouterXHop"
        - $ref: "#/components/parameters/RouterXChain"
        - name: model
          in: path
          required: true
          schema: { type: string }
          description: Gemini 模型名，例如 gemini-pro。
      requestBody:
        $ref: "#/components/requestBodies/GeminiGenerateContentJSON"
      responses:
        "200":
          description: Gemini-compatible response.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "4XX":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
  /v1/models/{model}:streamGenerateContent:
    post:
      tags: [Gemini Compatible]
      summary: Gemini streamGenerateContent
      description: 基础实现；命中 OpenAI-compatible 上游时，Gemini 请求会先转换为 Chat Completions stream 请求，并将 OpenAI data chunk 转为 Gemini SSE data 事件；命中 Gemini 上游时，会原生调用 /v1beta/models/{model}:streamGenerateContent 并透传 Gemini SSE。usage 会从 OpenAI SSE usage 或 Gemini usageMetadata 提取后写入 RouterX 日志并扣费；异常中断事件、完整 SDK 行为和 usage fallback 仍以 docs/PROTOCOLS.md 为准。
      security:
        - ApiKeyBearer: []
      parameters:
        - $ref: "#/components/parameters/RouterXOptions"
        - $ref: "#/components/parameters/RouterXHop"
        - $ref: "#/components/parameters/RouterXChain"
        - name: model
          in: path
          required: true
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/GenericJSON"
      responses:
        "200":
          description: Gemini-compatible SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
  /v1/models/{model}:embedContent:
    post:
      tags: [Gemini Compatible]
      summary: Gemini embedContent
      description: 基础实现；命中 OpenAI-compatible 上游时，Gemini content.parts 文本会转换为 Embeddings input，outputDimensionality 会映射为 OpenAI dimensions，并调用 /v1/embeddings，上游响应会转换为 Gemini embedding.values，taskType/title 会写入 request_snapshot.adapter_degradations 的 dropped 降级摘要。命中 Gemini 上游时会原生调用 /v1beta/models/{model}:embedContent，保留 content、taskType、title 和 outputDimensionality，并从 usageMetadata 写入 RouterX 日志和扣费。
      security:
        - ApiKeyBearer: []
      parameters:
        - $ref: "#/components/parameters/RouterXOptions"
        - $ref: "#/components/parameters/RouterXHop"
        - $ref: "#/components/parameters/RouterXChain"
        - name: model
          in: path
          required: true
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/GeminiEmbedContentJSON"
      responses:
        "200":
          description: Gemini-compatible embedding response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  embedding:
                    type: object
                    properties:
                      values:
                        type: array
                        items:
                          type: number
                          format: float
        "4XX":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
  /v1/models/{model}:batchEmbedContents:
    post:
      tags: [Gemini Compatible]
      summary: Gemini batchEmbedContents
      description: 基础实现；命中 OpenAI-compatible 上游时，Gemini requests[].content.parts 文本会转换为 Embeddings input 数组，outputDimensionality 会映射为 OpenAI dimensions，并调用 /v1/embeddings，上游 embedding list 会转换为 Gemini embeddings[].values；同批次已填写的 outputDimensionality 必须一致，批量请求继承 OpenAI Embeddings 2048 上限，上游返回 embedding 数量必须与请求数量一致，否则返回 Gemini 兼容 502/UNAVAILABLE，message 为 upstream response conversion failed，对应 RouterX 错误语义 upstream_conversion_failed，taskType/title 会写入 request_snapshot.adapter_degradations 的 dropped 降级摘要。命中 Gemini 上游时会原生调用 /v1beta/models/{model}:batchEmbedContents，保留 requests[].content、taskType、title 和 outputDimensionality，并从 usageMetadata 写入 RouterX 日志和扣费。
      security:
        - ApiKeyBearer: []
      parameters:
        - $ref: "#/components/parameters/RouterXOptions"
        - $ref: "#/components/parameters/RouterXHop"
        - $ref: "#/components/parameters/RouterXChain"
        - name: model
          in: path
          required: true
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/GeminiBatchEmbedContentsJSON"
      responses:
        "200":
          description: Gemini-compatible batch embedding response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  embeddings:
                    type: array
                    items:
                      type: object
                      properties:
                        values:
                          type: array
                          items:
                            type: number
                            format: float
        "4XX":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
  /v1/models/{model}:countTokens:
    post:
      tags: [Gemini Compatible]
      summary: Gemini countTokens
      description: 本地近似 Token 计数；优先统计 contents[].parts[]、systemInstruction.parts[] 或 generateContentRequest 内的实际 prompt 文本，不把 JSON 字段名计入 prompt。generateContentRequest 存在时按 Gemini 语义忽略顶层 contents；该结果不等同于真实 Gemini tokenizer。
      security:
        - ApiKeyBearer: []
      parameters:
        - name: model
          in: path
          required: true
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/GeminiCountTokensJSON"
      responses:
        "200":
          description: Token 计数结果。
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalTokens:
                    type: integer
        "4XX":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
components:
  securitySchemes:
    UserJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: /v0/user 和 /v0/admin 使用的用户登录态。
    ApiKeyBearer:
      type: http
      scheme: bearer
      description: /v1 模型接口使用 sk- API Key。
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: uint64 }
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    Keyword:
      name: keyword
      in: query
      schema: { type: string }
    Role:
      name: role
      in: query
      schema: { type: integer }
      description: 1=user, 10=admin, 100=super admin。
    Status:
      name: status
      in: query
      schema: { type: integer }
    ErrorCode:
      name: error_code
      in: query
      schema: { type: string }
      description: 调用日志稳定错误 code 过滤，例如 upstream_400、rate_limit_exceeded 或 usage_missing。
    ErrorSource:
      name: error_source
      in: query
      schema:
        type: string
        enum: [request, auth, quota, route, channel, upstream, billing, system]
      description: 调用日志失败来源过滤。
    UpstreamStatus:
      name: upstream_status
      in: query
      schema: { type: integer }
      description: 上游 HTTP 状态过滤；未调用上游的本地错误通常为 0 或空。
    GroupID:
      name: group_id
      in: query
      schema: { type: integer, format: uint64 }
    UserID:
      name: user_id
      in: query
      schema: { type: integer, format: uint64 }
    TokenID:
      name: token_id
      in: query
      schema: { type: integer, format: uint64 }
    ChannelID:
      name: channel_id
      in: query
      schema: { type: integer, format: uint64 }
    Model:
      name: model
      in: query
      schema: { type: string }
    RouterXOptions:
      name: X-RouterX-Options
      in: header
      required: false
      schema:
        type: string
        example: '{"route":{"channel_group":"premium"},"upstream":{"headers":{"X-Upstream-Feature":"beta"},"query":{"trace":"enabled"},"body":{"reasoning_effort":"high"}},"provider":{"xai":{"search_parameters":{"mode":"auto"}}}}'
      description: 可选 RouterX 私有选项 JSON 字符串；支持 route 路由偏好、upstream 安全 header/query/JSON body 补充和 provider 选中上游专属 JSON body 补充，body/form 中的 routerx 字段优先于该 header，发往真实上游前不会透传 routerx 私有字段。
    RouterXHop:
      name: X-RouterX-Hop
      in: header
      required: false
      schema:
        type: integer
        minimum: 0
        example: 1
      description: 多层 RouterX-Compatible 上游循环保护 hop；选中 RouterX 上游时服务端会递增后转发，达到 relay.routerx_max_hops 配置上限时返回 routerx_hop_exceeded，默认上限为 3。
    RouterXChain:
      name: X-RouterX-Chain
      in: header
      required: false
      schema:
        type: string
        example: edge
      description: 多层 RouterX-Compatible 上游链路摘要；选中 RouterX 上游时服务端会追加当前 routerx 节点后转发，例如 edge,routerx。
    StartTime:
      name: start_time
      in: query
      schema: { type: string, format: date-time }
    EndTime:
      name: end_time
      in: query
      schema: { type: string, format: date-time }
  requestBodies:
    AnthropicCountTokensJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Anthropic-compatible count_tokens 请求；当前为本地近似计数，优先统计 system 和 messages[].content 文本。
            properties:
              model:
                type: string
                example: claude-3-5-sonnet-latest
              system:
                oneOf:
                  - type: string
                    example: be concise
                  - type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        type:
                          type: string
                          example: text
                        text:
                          type: string
                    description: Anthropic system content blocks；基础实现统计其中的 text。
              messages:
                type: array
                minItems: 1
                items:
                  type: object
                  required: [role, content]
                  properties:
                    role:
                      type: string
                      enum: [user, assistant]
                    content:
                      oneOf:
                        - type: string
                          example: hello world
                        - type: array
                          items:
                            type: object
                            additionalProperties: true
                            properties:
                              type:
                                type: string
                                example: text
                              text:
                                type: string
                          description: Anthropic content blocks；基础实现统计其中的 text，非文本块按紧凑 JSON 参与近似计数。
              tools:
                type: array
                description: 当前 count_tokens 不把工具 schema 字段名计入本地 prompt 文本近似值；真实厂商 tokenizer 后续可精确化。
                items:
                  type: object
                  additionalProperties: true
    GeminiGenerateContentJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [contents]
            description: Gemini-compatible generateContent 请求；命中 Gemini 上游时保留列出的原生字段，且成功日志不会把这些字段误记为 dropped；命中 OpenAI-compatible 上游时按 Chat 形态转换并记录不可映射字段降级。
            properties:
              contents:
                type: array
                minItems: 1
                items:
                  type: object
                  required: [parts]
                  properties:
                    role:
                      type: string
                      enum: [user, model]
                    parts:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        additionalProperties: true
                        properties:
                          text:
                            type: string
                      example:
                        - text: hello
                example:
                  - role: user
                    parts:
                      - text: hello
              systemInstruction:
                type: object
                properties:
                  parts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        text:
                          type: string
                description: 命中 Gemini 上游时按原生字段保留；命中 OpenAI-compatible 上游时 text part 会合并为 system message。
              generationConfig:
                type: object
                additionalProperties: true
                description: 命中 Gemini 上游时完整保留；命中 OpenAI-compatible 上游时仅 maxOutputTokens、temperature、topP、stopSequences 显式映射，其余有值子字段记录 dropped 降级摘要。
                properties:
                  maxOutputTokens:
                    type: integer
                    minimum: 1
                  temperature:
                    type: number
                    format: double
                  topP:
                    type: number
                    format: double
                  stopSequences:
                    type: array
                    items: { type: string }
                  responseMimeType:
                    type: string
                    example: application/json
                  responseSchema:
                    type: object
                    additionalProperties: true
              safetySettings:
                type: array
                description: Gemini 原生安全设置；命中 Gemini 上游时透传。
                items:
                  type: object
                  additionalProperties: true
                  properties:
                    category:
                      type: string
                      example: HARM_CATEGORY_DANGEROUS_CONTENT
                    threshold:
                      type: string
                      example: BLOCK_ONLY_HIGH
              tools:
                type: array
                description: Gemini 原生 tools/functionDeclarations；命中 Gemini 上游时透传，命中 OpenAI-compatible 上游时当前不映射并记录降级。
                items:
                  type: object
                  additionalProperties: true
              toolConfig:
                type: object
                additionalProperties: true
                description: Gemini 原生 toolConfig；命中 Gemini 上游时透传。
              cachedContent:
                type: string
                description: Gemini 原生 cachedContent 引用；命中 Gemini 上游时透传。
    GeminiEmbedContentJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [content]
            properties:
              content:
                type: object
                required: [parts]
                properties:
                  parts:
                    type: array
                    minItems: 1
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                          minLength: 1
                    example:
                      - text: hello
                      - text: world
              taskType:
                type: string
                description: Gemini 原生 embedding 任务类型；命中 Gemini 上游时透传，命中 OpenAI-compatible 上游时记录 dropped 降级摘要。
              title:
                type: string
                description: Gemini RETRIEVAL_DOCUMENT 标题；命中 Gemini 上游时透传，命中 OpenAI-compatible 上游时记录 dropped 降级摘要。
              outputDimensionality:
                type: integer
                minimum: 1
                description: 命中 Gemini 上游时作为原生 outputDimensionality 透传；命中 OpenAI-compatible 上游时映射为 dimensions。
    GeminiBatchEmbedContentsJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [requests]
            properties:
              requests:
                type: array
                minItems: 1
                maxItems: 2048
                description: 命中 Gemini 上游时 requests 会原生透传；命中 OpenAI-compatible 上游时，每个请求的文本 parts 会被合并为一个 Embeddings input，且上游返回 embedding 数量必须与 requests 数量一致。
                items:
                  type: object
                  required: [content]
                  properties:
                    content:
                      type: object
                      required: [parts]
                      properties:
                        parts:
                          type: array
                          minItems: 1
                          items:
                            type: object
                            properties:
                              text:
                                type: string
                                minLength: 1
                    taskType:
                      type: string
                      description: 命中 Gemini 上游时作为原生 taskType 透传；命中 OpenAI-compatible 上游时暂不转发，并记录 dropped 降级摘要。
                    title:
                      type: string
                      description: 命中 Gemini 上游时作为原生 title 透传；命中 OpenAI-compatible 上游时暂不转发，并记录 dropped 降级摘要。
                    outputDimensionality:
                      type: integer
                      minimum: 1
                      description: 命中 Gemini 上游时作为原生 outputDimensionality 透传；命中 OpenAI-compatible 上游时映射为 dimensions，同一批次中已填写的值必须一致。
                example:
                  - content:
                      parts:
                        - text: hello
                  - content:
                      parts:
                        - text: world
    GeminiCountTokensJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: 本地近似 countTokens 请求；generateContentRequest 存在时忽略顶层 contents。
            properties:
              contents:
                type: array
                description: Gemini Content 数组；基础实现会统计 parts 中的 text，非文本 part 以紧凑 JSON 降级参与近似计数。
                items:
                  type: object
                  properties:
                    role:
                      type: string
                      enum: [user, model]
                    parts:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                        properties:
                          text:
                            type: string
                example:
                  - role: user
                    parts:
                      - text: hello world
              systemInstruction:
                type: object
                description: Gemini system instruction；基础实现会统计 parts 中的 text。
                properties:
                  parts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        text:
                          type: string
              generateContentRequest:
                type: object
                description: Gemini GenerateContentRequest 包裹体；设置后会忽略顶层 contents，统计该对象内的 contents 和 systemInstruction。
                properties:
                  contents:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                          enum: [user, model]
                        parts:
                          type: array
                          items:
                            type: object
                            additionalProperties: true
                            properties:
                              text:
                                type: string
                  systemInstruction:
                    type: object
                    properties:
                      parts:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                          properties:
                            text:
                              type: string
    EmbeddingsJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [model, input]
            properties:
              model:
                type: string
                description: OpenAI-compatible embedding 模型名；Azure OpenAI 通道会把该值作为 deployment 名。
                example: text-embedding-3-small
              input:
                oneOf:
                  - type: string
                    minLength: 1
                    description: 单条非空文本。
                    example: hello
                  - type: array
                    minItems: 1
                    maxItems: 2048
                    description: 非空文本批量。
                    items:
                      type: string
                      minLength: 1
                    example: ["hello", "world"]
                  - type: array
                    minItems: 1
                    description: 单条 token id 数组。
                    items:
                      type: integer
                      format: int64
                      minimum: 0
                    example: [101, 2023, 2003, 102]
                  - type: array
                    minItems: 1
                    maxItems: 2048
                    description: token id 数组批量。
                    items:
                      type: array
                      minItems: 1
                      items:
                        type: integer
                        format: int64
                        minimum: 0
                    example: [[101, 102], [201, 202]]
              encoding_format:
                type: string
                enum: [float, base64]
              dimensions:
                type: integer
                minimum: 1
              user:
                type: string
              routerx:
                type: object
                additionalProperties: true
                description: RouterX 私有路由或上游补充选项；发往真实上游前会被剥离。
    ImageGenerationJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [model, prompt]
            properties:
              model:
                type: string
                description: OpenAI-compatible 图像生成模型名；Azure OpenAI 通道会把该值作为 deployment 名。
                example: gpt-image-1
              prompt:
                type: string
                minLength: 1
                description: 图像生成提示词；RouterX 不在本地改写。
                example: draw a small router on a clean desk
              size:
                type: string
                description: 省略、空字符串或 auto 表示交给上游默认策略；WIDTHxHEIGHT 必须为正整数，单边不超过 4096，总像素不超过 4194304。非法值返回 invalid_image_size，且不调用上游、不扣费。
                example: 1024x1024
              n:
                type: integer
                minimum: 1
                description: 生成图片数量；具体上限由上游模型决定。
                example: 1
              quality:
                type: string
                description: 质量选项透传到上游；合法值由上游模型决定。
                example: standard
              response_format:
                type: string
                enum: [url, b64_json]
                description: OpenAI-compatible 响应格式；部分新模型可能忽略该字段。
              user:
                type: string
                description: 上游 user 字段；按原样透传。
              routerx:
                type: object
                additionalProperties: true
                description: RouterX 私有路由或上游补充选项；发往真实上游前会被剥离。
    AudioSpeechJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [model, input, voice]
            properties:
              model:
                type: string
                description: OpenAI-compatible 文本转语音模型名；Azure OpenAI 通道会把该值作为 deployment 名。
                example: tts-1
              input:
                type: string
                minLength: 1
                description: 要合成的文本；RouterX 不在本地改写。
                example: hello from RouterX
              voice:
                type: string
                description: 上游语音名称；合法值由上游模型决定。
                example: alloy
              response_format:
                type: string
                enum: ["", mp3, opus, aac, flac, wav, pcm]
                description: 省略或空字符串时使用上游默认策略；显式值只允许列出的音频容器格式。非法值返回 invalid_audio_response_format，且不调用上游、不扣费。
                example: mp3
              speed:
                type: number
                format: float
                description: 合成语速；具体范围由上游模型决定。
                example: 1
              user:
                type: string
                description: 上游 user 字段；按原样透传。
              routerx:
                type: object
                additionalProperties: true
                description: RouterX 私有路由或上游补充选项；发往真实上游前会被剥离。
    GenericJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    AudioMultipart:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [model, file]
            properties:
              model:
                type: string
                description: OpenAI-compatible 音频模型名；RouterX 使用该值选择通道。
                example: whisper-1
              file:
                type: string
                format: binary
                description: 音频文件字段；单个文件超过 relay.max_multipart_file_bytes 时返回 413 request_file_too_large，路径形态、危险扩展名、非音频扩展名、非音频文件头或可执行/脚本内容签名会返回 400 unsafe_multipart_file。
              prompt:
                type: string
                description: 可选上下文提示词。
              response_format:
                type: string
                enum: [json, text, srt, verbose_json, vtt]
              language:
                type: string
                description: 转写语言；翻译接口可忽略。
              temperature:
                type: number
                format: float
              timestamp_granularities:
                type: array
                items:
                  type: string
                  enum: [word, segment]
              routerx:
                type: string
                description: RouterX 私有 JSON 字符串，例如 {"route":{"channel_group":"premium"},"upstream":{"headers":{"X-Upstream-Feature":"beta"}}}；发往真实上游前会被剥离，multipart 当前不合并 upstream.body 回文件表单。
    ImageMultipart:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [model, image]
            properties:
              model:
                type: string
                description: OpenAI-compatible 图像模型名；RouterX 使用该值选择通道。
                example: gpt-image-1
              image:
                type: string
                format: binary
                description: 输入图像文件字段；单个文件超过 relay.max_multipart_file_bytes 时返回 413 request_file_too_large，路径形态、危险扩展名、非图片扩展名、非图片文件头或可执行/脚本内容签名会返回 400 unsafe_multipart_file。
              mask:
                type: string
                format: binary
                description: 图像编辑可选遮罩文件字段；变体接口可忽略；单个文件超过 relay.max_multipart_file_bytes 时返回 413 request_file_too_large，路径形态、危险扩展名、非图片扩展名、非图片文件头或可执行/脚本内容签名会返回 400 unsafe_multipart_file。
              prompt:
                type: string
                description: 图像编辑提示词；变体接口可忽略。
              n:
                type: integer
                minimum: 1
              size:
                type: string
                example: 1024x1024
              response_format:
                type: string
                enum: [url, b64_json]
              user:
                type: string
              routerx:
                type: string
                description: RouterX 私有 JSON 字符串，例如 {"route":{"channel_group":"premium"},"upstream":{"headers":{"X-Upstream-Feature":"beta"}}}；发往真实上游前会被剥离，multipart 当前不合并 upstream.body 回文件表单。
  responses:
    StandardOK:
      description: 成功。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardBadRequest:
      description: 参数或业务错误。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardUnauthorized:
      description: 未登录或登录已过期。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardForbidden:
      description: 权限不足。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardNotFound:
      description: 资源不存在。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    OpenAIError:
      description: OpenAI-compatible /v1 错误。本地限流返回 rate_limit_error + rate_limit_exceeded；未知 /v1 路径在通过 API Key 鉴权后返回 404 unsupported_api；请求体超过 relay.max_request_body_bytes 时返回 413 request_body_too_large；Image Generations size 超出基础边界时返回 400 invalid_image_size；Audio Speech response_format 超出基础枚举时返回 400 invalid_audio_response_format；OpenAI-compatible multipart 单个文件字段超过 relay.max_multipart_file_bytes 时返回 413 request_file_too_large，路径形态、危险扩展名、扩展名或文件头与图片/音频 API 不匹配或可执行/脚本内容签名返回 400 unsafe_multipart_file；选中通道 adapter 不支持当前 APIType 时返回 502 unsupported_api_type；非流式上游响应超过 relay.max_response_body_bytes 时返回 502 upstream_response_too_large。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenAIErrorEnvelope"
    AnthropicError:
      description: Anthropic-compatible 错误。本地 JSON 解析失败语义为 invalid_json，缺少 model 语义为 model_required；本地限流返回 type=rate_limit_error；请求体超过 relay.max_request_body_bytes 时返回 413 invalid_request_error；非流式上游响应超过 relay.max_response_body_bytes 时返回 502 upstream_error。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AnthropicErrorEnvelope"
    GeminiError:
      description: Gemini-compatible 错误。本地 JSON 解析失败语义为 invalid_json，缺少 model 语义为 model_required；本地限流返回 status=RESOURCE_EXHAUSTED；请求体超过 relay.max_request_body_bytes 时返回 413 RESOURCE_EXHAUSTED；非流式上游响应超过 relay.max_response_body_bytes 时返回 502 UNAVAILABLE。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorEnvelope"
    GenericJSON:
      description: JSON response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  schemas:
    StandardResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
      required: [success]
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        database:
          type: string
          nullable: true
        redis:
          type: string
          nullable: true
          enum: [required, unavailable]
          description: 外部数据库模式下 Redis 缺失或不可用时返回。
        migration:
          type: string
          nullable: true
          enum: [dirty, unavailable]
          description: schema_migrations 存在脏迁移或查询迁移状态失败时返回。
        jwt:
          type: string
          nullable: true
        setting:
          type: string
          nullable: true
    SetupStatus:
      type: object
      properties:
        initialized:
          type: boolean
    SetupInitRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          minLength: 6
          maxLength: 128
        display_name:
          type: string
        email:
          type: string
          format: email
    RegisterRequest:
      allOf:
        - $ref: "#/components/schemas/SetupInitRequest"
    LoginRequest:
      type: object
      required: [password]
      properties:
        account:
          type: string
          description: 用户名、邮箱或其他统一账号标识。
        username:
          type: string
          description: 兼容旧客户端。
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: User JWT。
        user:
          $ref: "#/components/schemas/UserBrief"
    UserBrief:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        username: { type: string }
        display_name: { type: string }
        email: { type: string }
        role: { type: integer, description: "1=user, 10=admin, 100=super admin" }
        quota: { type: integer, format: int64 }
        status: { type: integer }
        group_id: { type: integer, format: uint64, nullable: true }
    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 64 }
        password: { type: string, minLength: 6, maxLength: 128 }
        display_name: { type: string }
        email: { type: string }
        role: { type: integer }
        quota: { type: integer, format: int64 }
        group_id: { type: integer, format: uint64, nullable: true }
    UpdateUserRequest:
      type: object
      properties:
        display_name: { type: string }
        email: { type: string }
        role: { type: integer, nullable: true }
        status: { type: integer, nullable: true }
        group_id: { type: integer, format: uint64, nullable: true }
    UserGroupInfo:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        name:
          type: string
          description: 分组名。
          example: vip
        ratio:
          type: number
          format: double
          description: 分组元数据/兼容展示倍率；实际扣费倍率以 billing.* settings 为准。
          example: 0.8
        created_at:
          type: string
          format: date-time
    CreateUserGroupRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 64, example: vip }
        ratio:
          type: number
          format: double
          description: 小于等于 0 时按 1 保存。
          example: 0.8
    UpdateUserGroupRequest:
      type: object
      properties:
        name: { type: string, maxLength: 64, example: vip-renamed }
        ratio:
          type: number
          format: double
          nullable: true
          description: 显式传入时必须大于 0。
          example: 0.9
    UpdateSelfRequest:
      type: object
      properties:
        display_name:
          type: string
          description: 新展示名；空字符串不会修改现有展示名。
        email:
          type: string
          description: 新邮箱；服务端会规范化并同步同用户 email/local 登录标识，若已被其他账号绑定则返回 400。
    CancelSelfRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: 当前本地登录密码，用于注销二次确认。
    RedeemCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          example: OFFLINE-CREDIT-1
    RedeemCodeResult:
      type: object
      properties:
        redeemed_quota: { type: integer, format: int64 }
        quota: { type: integer, format: int64 }
    UserModelInfo:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        price_rule:
          type: string
          description: 未配置启用价格时为 minimum_usage；命中启用 channel_model_prices 时为 channel_model_price:<price_mode>:v<rule_version>，否则命中启用 model_prices 时为 model_price:<price_mode>:v<rule_version>。
          example: channel_model_price:token:v1
        pricing_ready:
          type: boolean
          description: true 表示已命中启用 channel_model_prices 或 model_prices；false 表示当前模型仍按 P0 minimum_usage 状态展示。
    UserModelListResult:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/UserModelInfo"
    UpsertModelPriceRequest:
      type: object
      required: [model, price_mode, price_expression]
      properties:
        model:
          type: string
          description: 模型名，必须唯一。
          example: gpt-4o-mini
        price_mode:
          type: string
          enum: [request, token, second, tiered]
          description: 价格模板类型。
          example: token
        price_expression:
          type: string
          description: 价格表达式；成功调用后若未命中通道级覆盖，热路径会执行该表达式并把规则、变量和版本写入 billing_snapshot。
          example: prompt_tokens * prompt_price + completion_tokens * completion_price
        variables_json:
          type: object
          nullable: true
          additionalProperties: true
          description: 表达式变量默认值。
          example:
            prompt_price: 1
            completion_price: 2
        unit_tokens:
          type: integer
          format: int64
          description: token 计价单位；未传或为 0 时服务端默认 1000。
          example: 1000
        enabled:
          type: boolean
          description: 创建时未传默认为 true；更新时未传则保留原状态。
    ModelPriceAdminInfo:
      type: object
      properties:
        id: { type: integer, format: int64 }
        model: { type: string }
        price_mode:
          type: string
          enum: [request, token, second, tiered]
        price_expression: { type: string }
        variables_json:
          type: object
          nullable: true
          additionalProperties: true
        unit_tokens: { type: integer, format: int64 }
        rule_version:
          type: integer
          format: int64
          description: 规则版本；创建为 1，更新、启用、禁用都会递增。
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ModelPriceAdminPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ModelPriceAdminInfo"
    UpsertChannelModelPriceRequest:
      type: object
      required: [channel_id, model, price_mode, price_expression]
      properties:
        channel_id:
          type: integer
          format: uint64
          description: 所属通道 ID；模型必须属于该通道 models。
          example: 12
        model:
          type: string
          description: 通道中的模型名，channel_id + model 必须唯一。
          example: gpt-4o-mini
        enabled:
          type: boolean
          description: 创建时未传默认为 true；更新时未传则保留原状态。
        user_enabled:
          type: boolean
          description: 创建时未传默认为 true；false 表示该通道模型不向普通用户展示，也不会进入普通用户调用候选。
        price_mode:
          type: string
          enum: [request, token, second, tiered]
          description: 价格模板类型。
          example: token
        override_mode:
          type: string
          enum: [override, merge_variables]
          description: 覆盖模式；未传默认为 override。
          example: override
        price_expression:
          type: string
          description: 通道级价格表达式；成功调用后如果选中通道命中启用覆盖，热路径会优先执行该表达式并把规则、变量和版本写入 billing_snapshot。
          example: prompt_tokens * prompt_price + completion_tokens * completion_price
        variables_json:
          type: object
          nullable: true
          additionalProperties: true
          description: 通道级表达式变量。
          example:
            prompt_price: 1
            completion_price: 2
        unit_tokens:
          type: integer
          format: int64
          description: token 计价单位；未传或为 0 时服务端默认 1000。
          example: 1000
    ChannelModelPriceAdminInfo:
      type: object
      properties:
        id: { type: integer, format: int64 }
        channel_id: { type: integer, format: uint64 }
        model: { type: string }
        enabled: { type: boolean }
        user_enabled: { type: boolean }
        price_mode:
          type: string
          enum: [request, token, second, tiered]
        override_mode:
          type: string
          enum: [override, merge_variables]
        price_expression: { type: string }
        variables_json:
          type: object
          nullable: true
          additionalProperties: true
        unit_tokens: { type: integer, format: int64 }
        rule_version:
          type: integer
          format: int64
          description: 规则版本；创建为 1，更新、启用、禁用都会递增。
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ChannelModelPriceAdminPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ChannelModelPriceAdminInfo"
    PaymentProductInfo:
      type: object
      properties:
        product_id: { type: string }
        name: { type: string }
        amount: { type: string }
        currency: { type: string }
        quota: { type: integer, format: int64 }
        base_quota: { type: integer, format: int64 }
        bonus_quota: { type: integer, format: int64 }
    UpsertPaymentProductRequest:
      type: object
      required: [product_id, name, amount, currency, quota]
      properties:
        product_id:
          type: string
          example: quota_100
        name:
          type: string
          example: 100 credits
        amount:
          type: string
          description: 定点金额字符串，当前基础校验按两位小数解析。
          example: "9.99"
        currency:
          type: string
          example: usd
        quota:
          type: integer
          format: int64
          description: 基础入账额度。
        bonus_quota:
          type: integer
          format: int64
          description: 赠送额度。
        enabled:
          type: boolean
          description: 创建时未传默认为 true；更新时未传则保留原状态。
        provider_config_json:
          type: object
          nullable: true
          additionalProperties: true
          description: provider 限定配置，如 Stripe price id。
    PaymentProductAdminInfo:
      allOf:
        - $ref: "#/components/schemas/PaymentProductInfo"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            enabled: { type: boolean }
            provider_config_json:
              type: object
              nullable: true
              additionalProperties: true
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
    PaymentProductAdminPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PaymentProductAdminInfo"
    PaymentManualAdjustmentRequest:
      type: object
      required: [user_id, amount, reason, idempotency_key]
      properties:
        user_id:
          type: integer
          format: uint64
          description: 目标普通用户 ID。
        order_no:
          type: string
          description: 可选本地支付订单号；传入时必须属于目标用户。
          example: RX202606150001
        amount:
          type: integer
          format: int64
          description: 人工修正额度增量；正数写 manual_credit，负数写 manual_debit，不能为 0。
          example: -100000000
        reason:
          type: string
          description: 人工补账或扣回原因；默认策略要求必填。
          example: chargeback correction
        idempotency_key:
          type: string
          description: 幂等键，建议使用工单号或人工动作唯一编号，防止重复改变余额。
          example: support-ticket-1234
    PaymentManualAdjustmentResult:
      type: object
      properties:
        user_id:
          type: integer
          format: uint64
        order_no:
          type: string
        amount:
          type: integer
          format: int64
        type:
          type: string
          enum: [manual_credit, manual_debit]
        balance_before:
          type: integer
          format: int64
        balance_after:
          type: integer
          format: int64
        idempotency_key:
          type: string
    PaymentManualRefundRequest:
      type: object
      required: [order_no, refund_quota, reason, idempotency_key]
      properties:
        order_no:
          type: string
          description: 本地支付订单号；订单必须处于 paid 状态。
          example: RX202606150001
        refund_quota:
          type: integer
          format: int64
          description: 本次人工退款扣回额度，必须大于 0 且不能超过订单额度。
          example: 40000000
        reason:
          type: string
          description: 人工退款原因；默认策略要求必填。
          example: customer refund
        idempotency_key:
          type: string
          description: 幂等键，建议使用退款工单号或人工动作唯一编号，防止重复扣回。
          example: refund-ticket-1234
    PaymentManualRefundResult:
      type: object
      properties:
        user_id:
          type: integer
          format: uint64
        order_no:
          type: string
        refund_quota:
          type: integer
          format: int64
        order_status:
          type: string
          enum: [refunded, partially_refunded]
        balance_before:
          type: integer
          format: int64
        balance_after:
          type: integer
          format: int64
        idempotency_key:
          type: string
    PaymentProviderRefundRequest:
      type: object
      required: [order_no, reason, idempotency_key]
      properties:
        order_no:
          type: string
          description: 本地支付订单号；订单必须是 paid 状态。Stripe 订单需已保存 provider_payment_id，易支付订单需配置 payment.epay.refund_url。
          example: RX202606150001
        refund_amount:
          type: string
          description: 退款金额；为空时按订单全额退款，非空时必须大于 0 且不能超过订单金额。
          example: "5.00"
        reason:
          type: string
          description: 发起 provider 退款的原因；默认策略要求必填，会写入 provider 请求摘要和管理审计。
          example: customer requested partial refund
        idempotency_key:
          type: string
          description: 幂等键；Stripe 会作为 Idempotency-Key，易支付会随退款表单签名提交，并在本地 payment_refund_requests 中唯一记录。
          example: refund-ticket-5678
    PaymentProviderRefundRequestResult:
      type: object
      properties:
        user_id:
          type: integer
          format: uint64
        order_no:
          type: string
        provider:
          type: string
          enum: [stripe, epay]
        provider_refund_id:
          type: string
          example: re_123
        refund_amount:
          type: string
          example: "5.00"
        refund_amount_minor:
          type: integer
          format: int64
          description: 退款金额的货币最小单位。
        refund_quota:
          type: integer
          format: int64
          description: 按订单金额比例推导的退款额度。
