  /v1/models/{model}:streamGenerateContent:
    post:
      tags: [Gemini Compatible]
      summary: Gemini streamGenerateContent
      description: 基础实现；Gemini 请求会先转换为 OpenAI-compatible Chat Completions stream 请求，当前支持 OpenAI-compatible SSE 上游，并将 OpenAI data chunk 转为 Gemini SSE data 事件。usage 从 OpenAI SSE chunk 提取后写入 RouterX 日志并扣费；Gemini 原生上游流式、完整 chunk 字段保真和 usage fallback 仍以 docs/PROTOCOLS.md 为准。
      security:
        - ApiKeyBearer: []
      parameters:
        - name: model
          in: path
          required: true
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/GenericJSON"
      responses:
        "200":
          description: Gemini-compatible SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
  /v1/models/{model}:embedContent:
    post:
      tags: [Gemini Compatible]
      summary: Gemini embedContent
      description: 基础实现；Gemini content.parts 文本会转换为 OpenAI-compatible Embeddings input 并调用 /v1/embeddings 上游，OpenAI embedding 响应会转换为 Gemini embedding.values。usage 写入 RouterX 日志并扣费；taskType/title、batch 和 Gemini 原生上游以 docs/PROTOCOLS.md 为准。
      security:
        - ApiKeyBearer: []
      parameters:
        - name: model
          in: path
          required: true
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/GenericJSON"
      responses:
        "200":
          description: Gemini-compatible embedding response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  embedding:
                    type: object
                    properties:
                      values:
                        type: array
                        items:
                          type: number
                          format: float
        "4XX":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
  /v1/models/{model}:batchEmbedContents:
    post:
      tags: [Gemini Compatible]
      summary: Gemini batchEmbedContents
      description: 基础实现；Gemini requests[].content.parts 文本会转换为 OpenAI-compatible Embeddings input 数组并调用 /v1/embeddings 上游，OpenAI embedding list 会转换为 Gemini embeddings[].values。usage 写入 RouterX 日志并扣费；批量边界、taskType/title 和 Gemini 原生上游以 docs/PROTOCOLS.md 为准。
      security:
        - ApiKeyBearer: []
      parameters:
        - name: model
          in: path
          required: true
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/GenericJSON"
      responses:
        "200":
          description: Gemini-compatible batch embedding response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  embeddings:
                    type: array
                    items:
                      type: object
                      properties:
                        values:
                          type: array
                          items:
                            type: number
                            format: float
        "4XX":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
  /v1/models/{model}:countTokens:
    post:
      tags: [Gemini Compatible]
      summary: Gemini countTokens
      description: 当前为近似计数。
      security:
        - ApiKeyBearer: []
      parameters:
        - name: model
          in: path
          required: true
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/GenericJSON"
      responses:
        "200":
          description: Token 计数结果。
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalTokens:
                    type: integer
        "4XX":
          $ref: "#/components/responses/GeminiError"
        "5XX":
          $ref: "#/components/responses/GeminiError"
components:
  securitySchemes:
    UserJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: /v0/user 和 /v0/admin 使用的用户登录态。
    ApiKeyBearer:
      type: http
      scheme: bearer
      description: /v1 模型接口使用 sk- API Key。
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: uint64 }
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    Keyword:
      name: keyword
      in: query
      schema: { type: string }
    Role:
      name: role
      in: query
      schema: { type: integer }
      description: 1=user, 10=admin, 100=super admin。
    Status:
      name: status
      in: query
      schema: { type: integer }
    GroupID:
      name: group_id
      in: query
      schema: { type: integer, format: uint64 }
    UserID:
      name: user_id
      in: query
      schema: { type: integer, format: uint64 }
    TokenID:
      name: token_id
      in: query
      schema: { type: integer, format: uint64 }
    ChannelID:
      name: channel_id
      in: query
      schema: { type: integer, format: uint64 }
    Model:
      name: model
      in: query
      schema: { type: string }
    StartTime:
      name: start_time
      in: query
      schema: { type: string, format: date-time }
    EndTime:
      name: end_time
      in: query
      schema: { type: string, format: date-time }
  requestBodies:
    GenericJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    AudioMultipart:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [model, file]
            properties:
              model:
                type: string
                description: OpenAI-compatible 音频模型名；RouterX 使用该值选择通道。
                example: whisper-1
              file:
                type: string
                format: binary
                description: 音频文件字段。
              prompt:
                type: string
                description: 可选上下文提示词。
              response_format:
                type: string
                enum: [json, text, srt, verbose_json, vtt]
              language:
                type: string
                description: 转写语言；翻译接口可忽略。
              temperature:
                type: number
                format: float
              timestamp_granularities:
                type: array
                items:
                  type: string
                  enum: [word, segment]
              routerx:
                type: string
                description: RouterX 私有 JSON 字符串，例如 {"route":{"channel_group":"premium"}}；发往真实上游前会被剥离。
    ImageMultipart:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [model, image]
            properties:
              model:
                type: string
                description: OpenAI-compatible 图像模型名；RouterX 使用该值选择通道。
                example: gpt-image-1
              image:
                type: string
                format: binary
                description: 输入图像文件字段。
              mask:
                type: string
                format: binary
                description: 图像编辑可选遮罩文件字段；变体接口可忽略。
              prompt:
                type: string
                description: 图像编辑提示词；变体接口可忽略。
              n:
                type: integer
                minimum: 1
              size:
                type: string
                example: 1024x1024
              response_format:
                type: string
                enum: [url, b64_json]
              user:
                type: string
              routerx:
                type: string
                description: RouterX 私有 JSON 字符串，例如 {"route":{"channel_group":"premium"}}；发往真实上游前会被剥离。
  responses:
    StandardOK:
      description: 成功。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardBadRequest:
      description: 参数或业务错误。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardUnauthorized:
      description: 未登录或登录已过期。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardForbidden:
      description: 权限不足。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    StandardNotFound:
      description: 资源不存在。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StandardResponse"
    OpenAIError:
      description: OpenAI-compatible /v1 错误。本地限流返回 rate_limit_error + rate_limit_exceeded。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenAIErrorEnvelope"
    AnthropicError:
      description: Anthropic-compatible 错误。本地限流返回 type=rate_limit_error。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AnthropicErrorEnvelope"
    GeminiError:
      description: Gemini-compatible 错误。本地限流返回 status=RESOURCE_EXHAUSTED。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GeminiErrorEnvelope"
    GenericJSON:
      description: JSON response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  schemas:
    StandardResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
      required: [success]
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        database:
          type: string
          nullable: true
        jwt:
          type: string
          nullable: true
    SetupStatus:
      type: object
      properties:
        initialized:
          type: boolean
    SetupInitRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          minLength: 6
          maxLength: 128
        display_name:
          type: string
        email:
          type: string
          format: email
    RegisterRequest:
      allOf:
        - $ref: "#/components/schemas/SetupInitRequest"
    LoginRequest:
      type: object
      required: [password]
      properties:
        account:
          type: string
          description: 用户名、邮箱或其他统一账号标识。
        username:
          type: string
          description: 兼容旧客户端。
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: User JWT。
        user:
          $ref: "#/components/schemas/UserBrief"
    UserBrief:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        username: { type: string }
        display_name: { type: string }
        email: { type: string }
        role: { type: integer, description: "1=user, 10=admin, 100=super admin" }
        quota: { type: integer, format: int64 }
        status: { type: integer }
        group_id: { type: integer, format: uint64, nullable: true }
    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 64 }
        password: { type: string, minLength: 6, maxLength: 128 }
        display_name: { type: string }
        email: { type: string }
        role: { type: integer }
        quota: { type: integer, format: int64 }
        group_id: { type: integer, format: uint64, nullable: true }
    UpdateUserRequest:
      type: object
      properties:
        display_name: { type: string }
        email: { type: string }
        role: { type: integer, nullable: true }
        status: { type: integer, nullable: true }
        group_id: { type: integer, format: uint64, nullable: true }
    UpdateSelfRequest:
      type: object
      properties:
        display_name: { type: string }
        email: { type: string }
    RedeemCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          example: OFFLINE-CREDIT-1
    RedeemCodeResult:
      type: object
      properties:
        redeemed_quota: { type: integer, format: int64 }
        quota: { type: integer, format: int64 }
    UserModelInfo:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        price_rule:
          type: string
          example: minimum_usage
        pricing_ready:
          type: boolean
          description: false 表示尚未接入 model_prices/channel_model_prices 价格表。
    UserModelListResult:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/UserModelInfo"
    PaymentProductInfo:
      type: object
      properties:
        product_id: { type: string }
        name: { type: string }
        amount: { type: string }
        currency: { type: string }
        quota: { type: integer, format: int64 }
        base_quota: { type: integer, format: int64 }
        bonus_quota: { type: integer, format: int64 }
    UpsertPaymentProductRequest:
      type: object
      required: [product_id, name, amount, currency, quota]
      properties:
        product_id:
          type: string
          example: quota_100
        name:
          type: string
          example: 100 credits
        amount:
          type: string
          description: 定点金额字符串，当前基础校验按两位小数解析。
          example: "9.99"
        currency:
          type: string
          example: usd
        quota:
          type: integer
          format: int64
          description: 基础入账额度。
        bonus_quota:
          type: integer
          format: int64
          description: 赠送额度。
        enabled:
          type: boolean
          description: 创建时未传默认为 true；更新时未传则保留原状态。
        provider_config_json:
          type: object
          nullable: true
          additionalProperties: true
          description: provider 限定配置，如 Stripe price id。
    PaymentProductAdminInfo:
      allOf:
        - $ref: "#/components/schemas/PaymentProductInfo"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            enabled: { type: boolean }
            provider_config_json:
              type: object
              nullable: true
              additionalProperties: true
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
    PaymentProductAdminPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PaymentProductAdminInfo"
    AdminAuditLogInfo:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        request_id:
          type: string
          nullable: true
        actor_user_id: { type: integer, format: uint64 }
        actor_role:
          type: integer
          description: 1=admin，2=super admin。
        action:
          type: string
          example: channel.update
        resource_type:
          type: string
          example: channel
        resource_id:
          type: string
          example: "1"
        before_summary:
          type: string
          description: 脱敏 JSON 摘要；创建动作可为空。
        after_summary:
          type: string
          description: 脱敏 JSON 摘要。
        result:
          type: string
          enum: [success, failed, denied]
        error_code:
          type: string
          description: 失败或拒绝时的稳定 code。
        ip: { type: string }
        user_agent: { type: string }
        created_at: { type: string, format: date-time }
    AdminAuditLogPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AdminAuditLogInfo"
    CreatePaymentOrderRequest:
      type: object
      required: [provider, product_id]
      properties:
        provider:
          type: string
          enum: [stripe, epay]
        product_id: { type: string }
        pay_type:
          type: string
          description: 易支付支付方式；Stripe 可忽略或使用 card。
        return_url:
          type: string
          description: 支付完成后的前端跳转地址；当前基础实现不直接信任此字段入账。
    PaymentOrderInfo:
      type: object
      properties:
        order_no: { type: string }
        provider: { type: string }
        status:
          type: string
          enum: [pending, paid, failed, closed, refunded]
        product_id: { type: string }
        amount: { type: string }
        currency: { type: string }
        quota: { type: integer, format: int64 }
        checkout_url:
          type: string
          nullable: true
          description: 易支付配置齐全时为签名收银台 URL；否则为本地安全占位链接。
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 创建订单时按 payment.order_expire_minutes 生成的过期时间快照。
        created_at: { type: string, format: date-time }
        paid_at: { type: string, format: date-time, nullable: true }
    PaymentOrderPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PaymentOrderInfo"
    StripeWebhookEvent:
      type: object
      required: [id, type, data]
      properties:
        id:
          type: string
          description: Stripe event id，用作 payment_events 幂等键。
          example: evt_123
        type:
          type: string
          description: 当前基础实现会处理 checkout.session.completed 和 charge.refunded。
          example: checkout.session.completed
        data:
          type: object
          required: [object]
          properties:
            object:
              type: object
              description: Stripe Checkout Session 或 Charge 对象。
              properties:
                id:
                  type: string
                  example: cs_test_123
                amount:
                  type: integer
                  format: int64
                  description: Charge 原金额，退款事件可用。
                amount_total:
                  type: integer
                  format: int64
                  description: Stripe minor unit 金额，例如 9.99 USD 为 999。
                  example: 999
                amount_refunded:
                  type: integer
                  format: int64
                  description: Stripe minor unit 退款金额；当前基础实现按全额退款处理。
                currency:
                  type: string
                  example: usd
                payment_status:
                  type: string
                  example: paid
                payment_intent:
                  type: string
                  example: pi_123
                metadata:
                  type: object
                  description: 支付成功事件要求 order_no/product_id/user_id；退款事件可仅携带 order_no，或通过 payment_intent 回查订单。
                  properties:
                    order_no: { type: string }
                    product_id: { type: string }
                    user_id: { type: string }
    EpayNotifyRequest:
      type: object
      required: [out_trade_no, money, trade_status, sign]
      properties:
        pid: { type: string }
        type: { type: string, example: alipay }
        out_trade_no: { type: string }
        trade_no: { type: string }
        money: { type: string }
        trade_status:
          type: string
          example: TRADE_SUCCESS
        name: { type: string }
        sign:
          type: string
          description: 排除 sign、sign_type 和空值字段后按易支付规则生成的 MD5 签名。
        sign_type:
          type: string
          example: MD5
    CreateRedemCodesRequest:
      type: object
      required: [quota]
      properties:
        quota:
          type: integer
          format: int64
          description: 每个充值码可兑换额度，必须大于 0。
        count:
          type: integer
          minimum: 1
          maximum: 100
          description: 随机生成数量；codes 为空时使用，默认 1。
        codes:
          type: array
          maxItems: 100
          items:
            type: string
            minLength: 4
            maxLength: 64
          description: 指定要导入的充值码；非空时按此列表创建。
    RedemCodeInfo:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        code: { type: string }
        quota: { type: integer, format: int64 }
        status:
          type: integer
          description: "0=unused, 1=used, 2=disabled"
        used_by: { type: integer, format: uint64, nullable: true }
        created_at: { type: string, format: date-time }
        used_at: { type: string, format: date-time, nullable: true }
    RedemCodePage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/RedemCodeInfo"
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string }
        new_password: { type: string, minLength: 6 }
    UpdateQuotaRequest:
      type: object
      required: [quota]
      properties:
        quota:
          type: integer
          format: int64
          description: 额度增量；负数表示扣减。
        reason:
          type: string
          description: 人工调额原因；为空时使用默认原因。
    PaginatedResult:
      type: object
      properties:
        total: { type: integer, format: int64 }
        page: { type: integer }
        page_size: { type: integer }
        data:
          type: array
          items: {}
    UserPage:
      allOf:
        - $ref: "#/components/schemas/PaginatedResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserBrief"
    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 64 }
        remain_quota:
          type: integer
          format: int64
          description: 有限 Key 的预算上限；0 表示无可用预算。
        unlimited:
          type: boolean
          description: true 时 remain_quota 为 -1，调用仍扣用户余额。
        expired_at:
          type: integer
          format: int64
          nullable: true
          description: Unix 秒时间戳。
    UpdateTokenRequest:
      type: object
      properties:
        name: { type: string }
        status: { type: integer, nullable: true }
        expired_at: { type: integer, format: int64, nullable: true }
        remain_quota:
          type: integer
          format: int64
          nullable: true
          deprecated: true
          description: 用户编辑接口不允许修改额度；传入会返回 403。
        unlimited:
          type: boolean
          nullable: true
          deprecated: true
          description: 用户编辑接口不允许修改无限标记；传入会返回 403。
    ReportTokenLeakRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 128
          description: 禁用或泄露上报原因；为空时服务端使用默认原因。
          example: public_repo
    UpdateTokenScopeRequest:
      type: object
      properties:
        allow_models:
          type: array
          description: 允许调用的 RouterX 对外模型名。空数组或省略表示不按模型额外收窄；"*" 表示允许所有模型。
          items:
            type: string
          example: ["gpt-4o-mini", "gpt-4o"]
        api_types:
          type: array
          description: 允许调用的内部 APIType。空数组或省略表示不按接口能力额外收窄；"*" 表示允许所有 APIType。
          items:
            type: string
            enum:
              - "*"
              - openai.chat
              - openai.completions
              - openai.responses
              - openai.embeddings
              - openai.images.generations
              - openai.images.edits
              - openai.images.variations
              - openai.audio.transcriptions
              - openai.audio.translations
              - openai.audio.speech
              - openai.moderations
          example: ["openai.chat", "openai.embeddings"]
        channel_groups:
          type: array
          description: 允许使用的通道分组。空数组或省略表示不按通道分组额外收窄；"*" 表示允许所有通道分组。
          items:
            type: string
          example: ["default", "cheap"]
        entry_protocols:
          type: array
          description: 允许使用该 Key 的客户端入口协议。空数组或省略表示不按入口协议额外收窄；"*" 表示允许所有入口协议。
          items:
            type: string
            enum:
              - "*"
              - openai
              - anthropic
              - gemini
          example: ["openai", "anthropic"]
        ip_cidrs:
          type: array
          description: 允许使用该 Key 的来源 IP 或 CIDR。空数组或省略表示不按来源 IP 额外收窄；"*" 表示允许所有来源。
          items:
            type: string
          example: ["203.0.113.10", "198.51.100.0/24"]
        methods:
          type: array
          description: 允许使用该 Key 的 HTTP 方法和路径。空数组或省略表示不按方法路径额外收窄；"*" 表示允许所有方法路径。
          items:
            type: string
          example: ["POST /v1/chat/completions", "GET /v1/models"]
        daily_quota:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 当日成功调用可消耗的最大额度；省略或 null 表示不按日预算额外收窄，达到上限后返回 insufficient_quota。
          example: 100000
        monthly_quota:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 当月成功调用可消耗的最大额度；省略或 null 表示不按月预算额外收窄，达到上限后返回 insufficient_quota。
          example: 3000000
        max_concurrency:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 同时在途请求上限；省略或 null 表示不按并发额外收窄，达到上限后返回 rate_limit_exceeded。Redis 可用时使用 Redis 计数，否则 SQLite/单机模式回落进程内计数。
          example: 2
        rpm:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 每分钟请求上限；省略或 null 表示不按请求频率额外收窄，达到上限后返回 rate_limit_exceeded。
          example: 60
        tpm:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 每分钟模型 token 上限；省略或 null 表示不按模型 token 频率额外收窄，达到上限后返回 rate_limit_exceeded。
          example: 100000
    BatchDisableTokensRequest:
      type: object
      properties:
        token_ids:
          type: array
          items: { type: integer, format: uint64 }
          description: 指定要禁用的 API Key ID 列表。
        user_id:
          type: integer
          format: uint64
          nullable: true
          description: 按所属用户批量禁用；可与 token_ids 组合取交集。
        reason:
          type: string
          maxLength: 128
          description: 批量禁用原因；为空时使用 admin_batch_disable。
          example: risk_review
      description: token_ids 和 user_id 至少提供一个，避免误禁用全部 Key。
    BatchExpireTokensRequest:
      type: object
      properties:
        token_ids:
          type: array
          items: { type: integer, format: uint64 }
          description: 指定要立即过期的 API Key ID 列表。
        user_id:
          type: integer
          format: uint64
          nullable: true
          description: 按所属用户批量过期；可与 token_ids 组合取交集。
        reason:
          type: string
          maxLength: 128
          description: 批量过期原因；为空时使用 admin_batch_expire。
          example: risk_review
      description: token_ids 和 user_id 至少提供一个，避免误过期全部 Key。
    Token:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        user_id: { type: integer, format: uint64 }
        name: { type: string }
        status: { type: integer }
        expired_at: { type: string, format: date-time, nullable: true }
        remain_quota: { type: integer, format: int64 }
        unlimited: { type: boolean }
        rotated_from_id:
          type: integer
          format: uint64
          nullable: true
          description: 轮换来源 API Key ID。
        revoked_reason:
          type: string
          description: 禁用原因；启用 Key 通常为空。
        scope:
          $ref: "#/components/schemas/TokenScope"
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: 最近一次成功或失败调用时间。
        last_used_ip_hash:
          type: string
          description: 最近来源 IP 的 SHA-256 摘要；不返回原始 IP。
          example: "b1f0c2d3e4f506172839405162738495a6b7c8d9e0f11223344556677889900a"
        last_user_agent_hash:
          type: string
          description: 最近 User-Agent 的 SHA-256 摘要；不返回原始 User-Agent。
          example: "a2f0c2d3e4f506172839405162738495b6c7d8e9f0011223344556677889900b"
        last_model:
          type: string
          description: 最近请求模型名。
          example: gpt-4o-mini
        last_error_code:
          type: string
          description: 最近失败的协议化错误 code；最近调用成功时为空。
          example: rate_limit_exceeded
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TokenScope:
      type: object
      properties:
        allow_models:
          type: array
          description: 当前已实现的模型 allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["gpt-4o-mini"]
        api_types:
          type: array
          description: 当前已实现的 APIType allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["openai.chat"]
        channel_groups:
          type: array
          description: 当前已实现的通道分组 allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["cheap"]
        entry_protocols:
          type: array
          description: 当前已实现的入口协议 allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["openai"]
        ip_cidrs:
          type: array
          description: 当前已实现的 IP/CIDR allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["198.51.100.0/24"]
        methods:
          type: array
          description: 当前已实现的方法路径 allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["POST /v1/chat/completions"]
        daily_quota:
          type: integer
          format: int64
          nullable: true
          description: 当前已实现的日预算；为空或不存在表示不按日预算额外收窄。
          example: 100000
        monthly_quota:
          type: integer
          format: int64
          nullable: true
          description: 当前已实现的月预算；为空或不存在表示不按月预算额外收窄。
          example: 3000000
        max_concurrency:
          type: integer
          format: int64
          nullable: true
          description: 当前已实现的并发上限；为空或不存在表示不按并发额外收窄。
          example: 2
        rpm:
          type: integer
          format: int64
          nullable: true
          description: 当前已实现的每分钟请求上限；为空或不存在表示不按请求频率额外收窄。
          example: 60
        tpm:
          type: integer
          format: int64
          nullable: true
          description: 当前已实现的每分钟模型 token 上限；为空或不存在表示不按模型 token 频率额外收窄。
          example: 100000
    CreateTokenResponse:
      allOf:
        - $ref: "#/components/schemas/Token"
        - type: object
          properties:
            key:
              type: string
