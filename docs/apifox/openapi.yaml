    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 64 }
        remain_quota:
          type: integer
          format: int64
          description: 有限 Key 的预算上限；0 表示无可用预算。
        unlimited:
          type: boolean
          description: true 时 remain_quota 为 -1，调用仍扣用户余额。
        expired_at:
          type: integer
          format: int64
          nullable: true
          description: Unix 秒时间戳。
        metadata:
          $ref: "#/components/schemas/TokenMetadata"
    UpdateTokenRequest:
      type: object
      properties:
        name: { type: string }
        status: { type: integer, nullable: true }
        expired_at: { type: integer, format: int64, nullable: true }
        remain_quota:
          type: integer
          format: int64
          nullable: true
          deprecated: true
          description: 用户编辑接口不允许修改额度；传入会返回 403。
        unlimited:
          type: boolean
          nullable: true
          deprecated: true
          description: 用户编辑接口不允许修改无限标记；传入会返回 403。
        metadata:
          $ref: "#/components/schemas/TokenMetadata"
    TokenMetadata:
      type: object
      description: API Key 非安全元数据，用于环境、团队、应用、标签和服务账号主体筛选；不得包含 API Key 明文、上游密钥、支付密钥或其他敏感凭据。
      properties:
        environment:
          type: string
          description: 环境标识，服务端会去空格并归一为小写。
          example: prod
        team:
          type: string
          description: 团队或责任方标识，服务端会去空格并归一为小写。
          example: platform
        app:
          type: string
          description: 应用或服务标识，服务端会去空格并归一为小写。
          example: router
        tags:
          type: array
          description: 标签列表，服务端会去重、去空格并归一为小写。
          items:
            type: string
          example: ["gateway", "rotated"]
        external_id:
          type: string
          description: 外部系统中的服务账号、项目或工单 ID。
          example: svc-router-prod
        note:
          type: string
          description: 简短备注，不应填写任何密钥或敏感凭据。
          example: owned by platform
        principal_type:
          type: string
          enum: [user, service_account]
          description: 非登录主体类型；服务账号或机器身份使用 service_account，普通人工主体可使用 user 或省略。
          example: service_account
        principal_id:
          type: string
          description: 非登录主体 ID，例如服务账号、工作负载或外部 IAM subject；服务端会去空格并归一为小写。
          example: svc-checkout-prod
        principal_name:
          type: string
          description: 人类可读主体名称，用于列表、审计和导出识别，不参与鉴权。
          example: Checkout Worker
    ReportTokenLeakRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 128
          description: 禁用或泄露上报原因；为空时服务端使用默认原因。
          example: public_repo
    UpdateTokenScopeRequest:
      type: object
      properties:
        allow_models:
          type: array
          description: 允许调用的 RouterX 对外模型名。空数组或省略表示不按模型额外收窄；"*" 表示允许所有模型。
          items:
            type: string
          example: ["gpt-4o-mini", "gpt-4o"]
        api_types:
          type: array
          description: 允许调用的内部 APIType。空数组或省略表示不按接口能力额外收窄；"*" 表示允许所有 APIType。
          items:
            type: string
            enum:
              - "*"
              - openai.chat
              - openai.completions
              - openai.responses
              - openai.embeddings
              - openai.images.generations
              - openai.images.edits
              - openai.images.variations
              - openai.audio.transcriptions
              - openai.audio.translations
              - openai.audio.speech
              - openai.moderations
          example: ["openai.chat", "openai.embeddings"]
        channel_groups:
          type: array
          description: 允许使用的通道分组。空数组或省略表示不按通道分组额外收窄；"*" 表示允许所有通道分组。
          items:
            type: string
          example: ["default", "cheap"]
        entry_protocols:
          type: array
          description: 允许使用该 Key 的客户端入口协议。空数组或省略表示不按入口协议额外收窄；"*" 表示允许所有入口协议。
          items:
            type: string
            enum:
              - "*"
              - openai
              - anthropic
              - gemini
          example: ["openai", "anthropic"]
        ip_cidrs:
          type: array
          description: 允许使用该 Key 的来源 IP 或 CIDR。空数组或省略表示不按来源 IP 额外收窄；"*" 表示允许所有来源。
          items:
            type: string
          example: ["203.0.113.10", "198.51.100.0/24"]
        methods:
          type: array
          description: 允许使用该 Key 的 HTTP 方法和路径。空数组或省略表示不按方法路径额外收窄；"*" 表示允许所有方法路径。
          items:
            type: string
          example: ["POST /v1/chat/completions", "GET /v1/models"]
        daily_quota:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 当日成功调用可消耗的最大额度；省略或 null 表示不按日预算额外收窄，达到上限后返回 insufficient_quota。
          example: 100000
        monthly_quota:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 当月成功调用可消耗的最大额度；省略或 null 表示不按月预算额外收窄，达到上限后返回 insufficient_quota。
          example: 3000000
        max_concurrency:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 同时在途请求上限；省略或 null 表示不按并发额外收窄，达到上限后返回 rate_limit_exceeded。Redis 可用时使用 Redis 计数，否则 SQLite/单机模式回落进程内计数。
          example: 2
        rpm:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 每分钟请求上限；省略或 null 表示不按请求频率额外收窄，达到上限后返回 rate_limit_exceeded。
          example: 60
        tpm:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 该 Key 每分钟模型 token 上限；省略或 null 表示不按模型 token 频率额外收窄，达到上限后返回 rate_limit_exceeded。
          example: 100000
    BatchDisableTokensRequest:
      type: object
      properties:
        token_ids:
          type: array
          items: { type: integer, format: uint64 }
          description: 指定要禁用的 API Key ID 列表。
        user_id:
          type: integer
          format: uint64
          nullable: true
          description: 按所属用户批量禁用；可与 token_ids 组合取交集。
        reason:
