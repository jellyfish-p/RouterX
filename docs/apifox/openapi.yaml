        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/admin/payment/adjustments:
    post:
      tags: [Admin Payment]
      summary: 支付人工补账或扣回
      description: 管理员执行支付相关人工补账或扣回；amount 为正数时写 manual_credit，负数时写 manual_debit。默认要求 reason，idempotency_key 必填以防重复操作；传入 order_no 时校验订单属于目标用户，并把流水来源记为 payment_order。成功后写 payment_manual_adjust.credit 或 payment_manual_adjust.debit 管理审计；本地拒绝写 payment_manual_adjust.denied，error_code 区分缺少原因、重复幂等键、金额为 0、目标不存在或权限拒绝。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentManualAdjustmentRequest"
      responses:
        "200":
          description: 支付人工修正成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentManualAdjustmentResult"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/admin/payment/refunds:
    post:
      tags: [Admin Payment]
      summary: 支付人工退款落账
      description: 管理员对已确认的支付退款事实做人工落账；仅接受 paid 订单，refund_quota 必须大于 0 且不超过订单额度。成功后扣回用户额度，写 quota_transactions(type=refund_deduct, source_type=refund, source_id=<order_no>)，订单置为 refunded 或 partially_refunded，并写 payment_refund.manual 管理审计。reason 默认必填，idempotency_key 必填以防重复扣回；本地拒绝写 payment_refund.manual_denied，error_code 区分缺少订单号、退款额度非法、缺少原因、重复幂等键、订单状态不允许或余额不足。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentManualRefundRequest"
      responses:
        "200":
          description: 支付人工退款落账成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentManualRefundResult"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/admin/payment/refund-requests:
    post:
      tags: [Admin Payment]
      summary: 发起 provider 退款请求
      description: 管理员向 Stripe 或易支付发起 provider 退款请求；仅接受 paid 订单。Stripe 订单必须已保存 provider_payment_id，并调用 Stripe Refund API；易支付订单需要 payment.epay.pid、payment.epay.refund_url 和 PAYMENT_EPAY_KEY，并对退款表单做 MD5 签名。refund_amount 为空时按订单全额退款，非空时必须大于 0 且不超过订单金额。成功后写 payment_refund_requests、订单进入 refund_pending，并写 payment_refund.requested 管理审计；本地参数、订单状态或幂等键拒绝会写 payment_refund.request_denied 且 result=denied，provider 调用失败会写同动作但 result=failed，摘要不保存 provider secret；最终 refunded 或 partially_refunded 状态仍由可信 provider webhook 或后续人工收尾确认。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
