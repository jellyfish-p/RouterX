        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 创建订单时按 payment.order_expire_minutes 生成的过期时间快照。
        created_at: { type: string, format: date-time }
        paid_at: { type: string, format: date-time, nullable: true }
