openapi: 3.0.3
info:
  title: RouterX API
  version: 0.1.0
  description: |
    RouterX 后端 API 文档，供 Apifox 直接导入。

    本文件以当前 Go 路由注册和 docs/API.md 为准：
    - /v0/setup、/v0/user、/v0/admin 使用 RouterX 统一响应。
    - /v1 使用入口协议兼容响应，不包裹 success/data/message；模型转发接口可通过请求体/form 中的 routerx 或 X-RouterX-Options header 传递路由偏好和安全 upstream 补充参数；请求体超过 relay.max_request_body_bytes 时本地返回协议兼容 413 且不调用上游，OpenAI-compatible Images/Audio multipart 单个文件字段超过 relay.max_multipart_file_bytes 时返回 413 request_file_too_large，文件名命中路径形态/危险扩展名、扩展名或文件头与图片/音频 API 不匹配或内容命中可执行/脚本签名基础扫描时返回 400 unsafe_multipart_file，二者均不调用上游；选中通道 adapter 不支持当前 APIType 时返回 502 unsupported_api_type 且不调用上游；非流式上游响应超过 relay.max_response_body_bytes 时返回协议兼容 502 upstream_response_too_large 且不扣费。
    - 所有接口都会返回请求 ID 响应头；默认 header 为 X-Request-Id，可通过 observability.request_id_header 改为合法 HTTP header 名；/v1 调用上游时会透传同一个请求 ID。
    - 充值码、充值码创建/兑换拒绝审计、额度流水查询、API Key 生命周期审计、API Key 泄露告警收件箱、告警 Webhook/邮件/IM 投递 outbox、用户自助注销保留账号、含 HTTP 请求量/耗时、Relay 请求数、Relay/上游耗时、Relay 错误维度、token 用量、额度消耗维度、API Key 鉴权/生命周期/最近使用/额度/轮换/泄露、通道可用状态、逐通道错误计数、后台探测结果、限流拒绝、计费失败、DB/Redis 错误计数、日志库健康、日志补写 outbox 状态、告警投递 outbox 状态和审计事件计数的基础 /metrics、管理端支付商品、系统模型价格管理、通道模型价格覆盖、Stripe/易支付 provider 退款请求、管理审计查询、用户侧支付商品/订单、订单创建拒绝审计与未支付订单取消、Stripe webhook、Stripe 异步支付失败、易支付成功/失败异步通知和易支付同步返回基础接口已注册；OAuth/OIDC 等目标扩展尚未注册，未放入本文件 paths。
servers:
  - url: http://localhost:3000
    description: Local backend
tags:
  - name: Health
    description: 健康检查与就绪检查。
  - name: Setup
    description: 首次初始化。
  - name: User Auth
    description: 注册、登录和个人资料。
  - name: User API Key
    description: 用户 API Key 生命周期；Redis 鉴权 lookup cache 仅缓存 SHA256(api_key) 到 token_id 的映射，命中后仍回源数据库校验 Token、User、额度、过期和 scope。
  - name: User Usage
    description: 用户调用日志、账单统计、充值码和模型可见性。
  - name: User Payment
    description: 用户侧支付商品和订单。
  - name: Payment Webhook
    description: 支付 provider 异步通知。
  - name: Admin Users
    description: 管理员用户管理。
  - name: Admin API Key
    description: 管理员 API Key 查询、风险视图和批量处置。
  - name: Admin Redemption
    description: 管理员充值码管理。
  - name: Admin Audit
    description: 超级管理员管理审计查询。
  - name: Admin Alerts
    description: 管理员主动告警收件箱、确认处理和 Webhook/邮件/IM 投递。
  - name: Admin Payment
    description: 管理员支付商品管理。
  - name: Admin Billing
    description: 管理员计费规则和模型价格管理。
  - name: Admin Accounts
    description: 管理员账号管理。
  - name: Admin Channels
    description: 上游通道管理。
  - name: Admin Logs
    description: 全局日志、看板和设置。
  - name: OpenAI Compatible
    description: OpenAI-compatible /v1 入口。
  - name: Anthropic Compatible
    description: Anthropic-compatible /v1 入口。
  - name: Gemini Compatible
    description: Gemini-compatible /v1 入口。
paths:
  /health:
    get:
      tags: [Health]
      summary: 进程健康检查
      description: 不要求系统初始化或鉴权，只证明 HTTP 进程存活。
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      tags: [Health]
      summary: 服务就绪检查
      description: '检查数据库可用性、schema_migrations dirty 状态；SQL_DSN 指向 PostgreSQL/MySQL 等外部数据库时还要求 Redis 可用；初始化后还会检查 JWT 配置、关键 auth/relay/rate-limit settings 注册表校验、已启用支付 provider 的必需环境密钥，以及存在 enc:v1: 通道密钥时的 ENCRYPTION_KEY。迁移 dirty 时返回 not_ready 并在 migration 字段返回 dirty；关键 settings 因直接改库或迁移漂移变成非法值时会返回 not_ready 并在 setting 字段指出问题 key。配置 LOG_SQL_DSN 时，独立日志库在启动期初始化，初始化失败会阻止服务启动；运行期日志库写入失败会保留主库调用事实并写应用告警。'
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus 指标
      description: 默认由 observability.metrics_enabled=false 关闭；启用后返回 Prometheus text/plain，包含实例、HTTP 请求量/耗时、Relay 日志、Relay 请求数、Relay/上游耗时、Relay 错误维度、token 用量、额度消耗维度、API Key 鉴权/生命周期/最近使用/额度/轮换/泄露、通道可用状态、逐通道错误计数、后台探测结果、限流拒绝、计费失败、日志补写 outbox 状态、支付、审计和 DB/Redis/日志库基础指标。routerx_db_errors_total/routerx_redis_errors_total 使用 operation 标签标记 ping、log_ping 或 migration_status 等低基数失败点。routerx_api_key_quota_remaining 只统计当前可用且未过期的有限额度 API Key，避免把无限额度 Key 的 -1 混入剩余额度告警。
      responses:
        "200":
          description: Prometheus text format metrics.
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP routerx_users_total Total users.
                  # TYPE routerx_users_total gauge
                  routerx_users_total 1
                  # HELP routerx_http_requests_total HTTP requests by method, path group and status.
                  # TYPE routerx_http_requests_total counter
                  routerx_http_requests_total{method="GET",path_group="/health",status="200"} 12
                  # HELP routerx_http_request_duration_seconds HTTP request duration in seconds by method and path group.
                  # TYPE routerx_http_request_duration_seconds histogram
                  routerx_http_request_duration_seconds_bucket{method="GET",path_group="/health",le="0.005"} 10
                  routerx_http_request_duration_seconds_bucket{method="GET",path_group="/health",le="+Inf"} 12
                  routerx_http_request_duration_seconds_sum{method="GET",path_group="/health"} 0.034
                  routerx_http_request_duration_seconds_count{method="GET",path_group="/health"} 12
                  # HELP routerx_relay_duration_seconds Relay duration in seconds by protocol, API type and provider.
                  # TYPE routerx_relay_duration_seconds histogram
                  routerx_relay_duration_seconds_bucket{protocol="openai",api_type="chat",provider="openai-compatible",le="+Inf"} 42
                  routerx_relay_duration_seconds_sum{protocol="openai",api_type="chat",provider="openai-compatible"} 2.35
                  routerx_relay_duration_seconds_count{protocol="openai",api_type="chat",provider="openai-compatible"} 42
                  # HELP routerx_upstream_duration_seconds Upstream duration in seconds by provider, channel and status.
                  # TYPE routerx_upstream_duration_seconds histogram
                  routerx_upstream_duration_seconds_bucket{provider="openai-compatible",channel_id="1",status="success",le="+Inf"} 41
                  routerx_upstream_duration_seconds_sum{provider="openai-compatible",channel_id="1",status="success"} 1.93
                  routerx_upstream_duration_seconds_count{provider="openai-compatible",channel_id="1",status="success"} 41
                  # HELP routerx_logs_total Relay logs by status.
                  # TYPE routerx_logs_total counter
                  routerx_logs_total{status="success"} 42
                  # HELP routerx_tokens_used_total Model tokens used by model, provider and usage source.
                  # TYPE routerx_tokens_used_total counter
                  routerx_tokens_used_total{model="gpt-4o-mini",provider="openai-compatible",usage_source="upstream"} 4200
                  # HELP routerx_quota_used_total Quota used by model, provider and user group.
                  # TYPE routerx_quota_used_total counter
                  routerx_quota_used_total{model="gpt-4o-mini",provider="openai-compatible",user_group="default"} 4200
                  # HELP routerx_api_key_auth_total API key authentication attempts by result and reason.
                  # TYPE routerx_api_key_auth_total counter
                  routerx_api_key_auth_total{result="success",reason="authenticated"} 41
                  routerx_api_key_auth_total{result="failure",reason="invalid_key"} 2
                  # HELP routerx_api_key_active_total API keys by lifecycle status.
                  # TYPE routerx_api_key_active_total gauge
                  routerx_api_key_active_total{status="enabled"} 8
                  routerx_api_key_active_total{status="disabled"} 1
                  routerx_api_key_active_total{status="expired"} 1
                  # HELP routerx_api_key_last_used_age_seconds API key age since last use in seconds by lifecycle status.
                  # TYPE routerx_api_key_last_used_age_seconds histogram
                  routerx_api_key_last_used_age_seconds_bucket{status="enabled",le="86400"} 7
                  routerx_api_key_last_used_age_seconds_bucket{status="enabled",le="+Inf"} 8
                  routerx_api_key_last_used_age_seconds_sum{status="enabled"} 186400
                  routerx_api_key_last_used_age_seconds_count{status="enabled"} 8
                  # HELP routerx_api_key_quota_remaining Remaining limited API key quota by user group and key type.
                  # TYPE routerx_api_key_quota_remaining gauge
                  routerx_api_key_quota_remaining{user_group="default",key_type="limited"} 12000
                  # HELP routerx_api_key_rotation_total API key rotations by reason.
                  # TYPE routerx_api_key_rotation_total counter
                  routerx_api_key_rotation_total{reason="user_rotate"} 3
                  # HELP routerx_api_key_leak_events_total API key leak reports by source.
                  # TYPE routerx_api_key_leak_events_total counter
                  routerx_api_key_leak_events_total{source="public_repo"} 1
                  # HELP routerx_channel_probe_total Background channel breaker probes by result.
                  # TYPE routerx_channel_probe_total counter
                  routerx_channel_probe_total{result="success"} 3
                  # HELP routerx_payment_orders_total Payment orders by provider and status.
                  # TYPE routerx_payment_orders_total gauge
                  routerx_payment_orders_total{provider="stripe",status="paid"} 3
                  # HELP routerx_db_up Database ping status.
                  # TYPE routerx_db_up gauge
                  routerx_db_up 1
                  # HELP routerx_redis_up Redis ping status.
                  # TYPE routerx_redis_up gauge
                  routerx_redis_up 0
                  # HELP routerx_db_errors_total Database errors by operation.
                  # TYPE routerx_db_errors_total counter
                  routerx_db_errors_total{operation="migration_status"} 1
                  # HELP routerx_redis_errors_total Redis errors by operation.
                  # TYPE routerx_redis_errors_total counter
                  routerx_redis_errors_total{operation="ping"} 1
                  # HELP routerx_log_db_configured Independent log database configuration status.
                  # TYPE routerx_log_db_configured gauge
                  routerx_log_db_configured 1
                  # HELP routerx_log_db_up Log storage ping status.
                  # TYPE routerx_log_db_up gauge
                  routerx_log_db_up 1
                  # HELP routerx_log_replication_outbox_items Current log replication outbox items by status.
                  # TYPE routerx_log_replication_outbox_items gauge
                  routerx_log_replication_outbox_items{status="pending"} 2
                  # HELP routerx_alert_delivery_outbox_items Current alert delivery outbox items by status.
                  # TYPE routerx_alert_delivery_outbox_items gauge
                  routerx_alert_delivery_outbox_items{status="failed"} 1
        "404":
          description: 指标接口未启用。
  /v0/setup/status:
    get:
      tags: [Setup]
      summary: 查询初始化状态
      description: 公共初始化探测接口；返回系统是否已完成首次初始化，以及是否允许进入 /v0/setup/init。该接口不要求鉴权，也不受 SetupCheck 限制。
      responses:
        "200":
          description: 初始化状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SetupStatus"
  /v0/setup/init:
    post:
      tags: [Setup]
      summary: 首次初始化超级管理员
      description: 仅未初始化时可调用；会创建超级管理员、本地身份和默认 settings。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInitRequest"
      responses:
        "200":
          description: 初始化成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "409":
          description: 已初始化
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
  /v0/user/register:
    post:
      tags: [User Auth]
      summary: 用户注册
      description: 当前基础实现为用户名密码注册；默认关闭公开注册。需要 auth.register.enabled=true、auth.register.username.enabled=true 且 auth.register.captcha.required=false 才接受当前无验证码请求。新账号注册会应用 auth.register.default_quota 和可解析的 auth.register.default_group_id；请求提供 email 时会创建 email/local 登录标识，但密码哈希只保存到 username/local 主身份；同名 username/local identity 命中已注销普通用户时会恢复原 users.id、启用账号、更新本地密码身份和展示名，若恢复请求附带未被占用的 email 会补齐同用户 email/local 登录标识，保留额度/分组/日志/历史流水，不自动启用旧 API Key，并写 user.recover 审计。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserBrief"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "403":
          description: 公开注册关闭、用户名注册关闭，或当前无验证码请求但 auth.register.captcha.required=true。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardResponse"
  /v0/user/login:
    post:
      tags: [User Auth]
      summary: 用户统一登录
      description: 管理后台也使用本接口获取 User JWT，不提供独立 /v0/admin/login。用户名密码登录始终可用；email/phone 密码登录仅对已有本地身份生效，并分别受 auth.login.email_password.enabled 与 auth.login.phone_password.enabled 控制，默认关闭；本地 email/phone 身份复用同一用户的 username/local 主密码，不要求各自保存独立密码哈希。成功登录会写入 user.login 管理审计，审计摘要不包含密码或 JWT。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/user/self:
    get:
      tags: [User Auth]
      summary: 获取个人信息
      description: 返回当前 User JWT 对应的用户基础信息；不会返回密码、API Key 明文或其他敏感凭据。
      security:
        - UserJWT: []
      responses:
        "200":
          description: 当前登录用户
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserBrief"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
    put:
      tags: [User Auth]
      summary: 修改个人信息
      description: 当前用户修改自己的展示名和 email 等个人资料；不能通过该接口提升角色、修改余额、切换分组或绕过管理员权限。提交 email 时服务端会规范化并同步同用户 email/local 登录标识，该身份不保存重复密码哈希，邮箱密码登录开启后复用 username/local 主密码；目标 email 已被其他账号身份占用时返回 400，资料和 identity 都不会部分落库。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSelfRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
    delete:
      tags: [User Auth]
      summary: 注销当前账号
      description: 当前普通用户注销自己的账号；请求体必须提供当前本地密码做二次确认，缺少或错误密码不会修改账号和 API Key 状态，会写 user.self_cancel_denied 拒绝审计，error_code 为 self_cancel_password_required 或 self_cancel_password_invalid，摘要不保存密码。确认通过后服务端将 users.status 置为 disabled、禁用该用户已启用 API Key 并写 user.self_cancel 审计。该操作保留 users、user_identities、tokens、logs、quota 和历史流水；注销后不能再次登录，同名 username/local 注册会恢复原账号并写 user.recover 审计，旧 API Key 不会自动恢复。隐私字段擦除和邮箱/手机号/OAuth/OIDC 恢复属于后续增强。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelSelfRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/self/password:
    post:
      tags: [User Auth]
      summary: 修改登录密码
      description: 当前用户在登录态下修改本地密码；服务端校验旧密码后更新本地身份凭据，不会返回密码摘要或其他认证秘密。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/token:
    get:
      tags: [User API Key]
      summary: 当前用户 API Key 列表
      description: 返回当前用户自己的 API Key 分页列表；仅包含脱敏前缀、状态、过期时间、额度、非安全元数据和最近使用摘要，不返回完整 sk- 明文或哈希。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: API Key 分页列表，永不返回完整明文 key。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenPage"
    post:
      tags: [User API Key]
      summary: 创建 API Key
      description: 返回一次性 sk- 明文；可写入 environment/team/app/tags/external_id/note 和 principal_type/principal_id/principal_name 非安全元数据；有限额度 Key 创建时只设置预算上限，不扣用户余额，调用成功时再扣费。成功后写入 api_key.created 管理审计，审计摘要不包含完整明文 Key 或哈希。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "200":
          description: 创建成功，key 只在本次响应展示。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
  /v0/user/token/{id}:
    put:
      tags: [User API Key]
      summary: 编辑 API Key
      description: 普通用户只能编辑名称、状态、过期时间和非安全元数据，不能通过本接口修改额度或无限标记。普通编辑成功后写 api_key.updated 并清理 Redis 鉴权 lookup cache；将状态改为禁用写 api_key.disabled；尝试修改 remain_quota 或 unlimited 会返回 403 并写 api_key.quota_limit_denied。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTokenRequest"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "403":
          $ref: "#/components/responses/StandardForbidden"
        "404":
          $ref: "#/components/responses/StandardNotFound"
    delete:
      tags: [User API Key]
      summary: 删除 API Key
      description: 软删除当前用户自己的 API Key；成功后写 api_key.deleted 管理审计并清理 Redis 鉴权 lookup cache，历史调用日志保留 token_id 引用。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/StandardOK"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/disable:
    post:
      tags: [User API Key]
      summary: 禁用 API Key
      description: 显式禁用当前用户自己的 API Key，可选记录禁用原因；成功后写 api_key.disabled 管理审计并清理 Redis 鉴权 lookup cache。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportTokenLeakRequest"
      responses:
        "200":
          description: 禁用成功，返回脱敏 Token 摘要。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Token"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/rotate:
    post:
      tags: [User API Key]
      summary: 轮换 API Key
      description: 创建替换 Key，复制名称、过期时间、预算语义和 scope，写入 rotated_from_id，禁用旧 Key 并清理旧 Key 的 Redis 鉴权 lookup cache；新 key 明文只在本次响应展示，成功后写 api_key.rotated 管理审计。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: 轮换成功，返回新 Key 摘要和一次性明文。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/report-leak:
    post:
      tags: [User API Key]
      summary: 上报 API Key 泄露
      description: 立即禁用当前用户自己的 API Key，记录 revoked_reason，清理 Redis 鉴权 lookup cache，并返回替换建议；成功后写 api_key.leak_reported 管理审计，审计不包含明文 Key。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportTokenLeakRequest"
      responses:
        "200":
          description: 泄露上报成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ReportTokenLeakResponse"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/scope:
    put:
      tags: [User API Key]
      summary: 更新 API Key scope
      description: 更新当前用户自己的 API Key 收窄策略；当前支持 allow_models 模型 allow-list、api_types APIType allow-list、channel_groups 通道分组 allow-list、entry_protocols 入口协议 allow-list、ip_cidrs IP/CIDR allow-list、methods 方法路径 allow-list、daily_quota 日预算、monthly_quota 月预算、max_concurrency 并发上限、rpm 和 tpm。列表为空表示继承用户和系统策略；模型未命中返回 model_not_allowed，APIType、入口协议、IP 或方法路径未命中返回 token_forbidden，通道分组未命中返回 route_forbidden，日/月预算达到上限返回 insufficient_quota，并发上限或 RPM/TPM 命中返回 rate_limit_exceeded，且都不会调用上游。entry_protocols=gemini 覆盖 generateContent、streamGenerateContent、countTokens、embedContent 和 batchEmbedContents。成功后写 api_key.scope_updated 管理审计并清理 Redis 鉴权 lookup cache，审计摘要不包含明文 Key 或哈希。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTokenScopeRequest"
      responses:
        "200":
          description: Scope 更新成功，返回脱敏 Token 摘要。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Token"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/usage:
    get:
      tags: [User API Key]
      summary: API Key 用量摘要
      description: 返回当前用户指定 Key 的调用数、成功/失败数、额度消耗、总 tokens 和最近调用摘要。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: 单 Key 用量摘要。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenUsage"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/leak-window:
    get:
      tags: [User API Key]
      summary: API Key 泄露窗口摘要
      description: 当前用户查询自己的单 Key 最近调用窗口；window_hours 默认 24，最大 720。响应基于调用日志聚合调用数、成功/失败数、额度、tokens、模型、错误 code 和来源 IP 哈希计数，不返回完整明文 Key、Key 哈希或原始 IP。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: window_hours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
          description: 分析窗口，单位小时；服务端会把小于等于 0 的值归一为 24，大于 720 的值归一为 720。
      responses:
        "200":
          description: 单 Key 泄露窗口摘要。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenLeakWindow"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/token/{id}/events:
    get:
      tags: [User API Key]
      summary: API Key 错误和限流事件摘要
      description: 当前用户查询自己的单 Key 最近错误/限流事件窗口；window_hours 默认 24，最大 720。响应只基于失败调用日志聚合错误 code、错误来源、上游 HTTP 状态、限流维度和模型计数，不返回原始 IP、错误正文、完整明文 Key 或 Key 哈希。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: window_hours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
          description: 分析窗口，单位小时；服务端会把小于等于 0 的值归一为 24，大于 720 的值归一为 720。
      responses:
        "200":
          description: 单 Key 错误/限流事件摘要。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenEventWindow"
        "404":
          $ref: "#/components/responses/StandardNotFound"
  /v0/user/log:
    get:
      tags: [User Usage]
      summary: 当前用户调用日志
      description: 查询当前用户自己的模型调用日志，支持按 API Key、通道、模型、状态、稳定 error_code、失败来源 error_source、上游 HTTP 状态 upstream_status 和时间窗口过滤；响应中的请求/响应体、IP、错误原文和快照字段按服务端脱敏策略返回。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/TokenID"
        - $ref: "#/components/parameters/ChannelID"
        - $ref: "#/components/parameters/Model"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/ErrorCode"
        - $ref: "#/components/parameters/ErrorSource"
        - $ref: "#/components/parameters/UpstreamStatus"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: 当前用户自己的日志分页。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LogPage"
  /v0/user/billing:
    get:
      tags: [User Usage]
      summary: 当前用户账单统计
      description: 聚合当前用户成功调用日志中的 call_count、total_quota 和 total_tokens；可通过 token_id 只查看指定 API Key 的账单聚合，不会跨用户读取其他 Key。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/TokenID"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: 用户账单聚合。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BillingStats"
  /v0/user/quota-transactions:
    get:
      tags: [User Usage]
      summary: 当前用户额度流水
      description: 查询当前用户自己的余额变更流水。该接口只返回支付入账、充值码兑换、退款扣回、人工补账和人工扣回等 quota_transactions；模型调用消费仍查询 /v0/user/log 或 /v0/user/billing。即使传入 user_id，服务端也会强制使用当前登录用户。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: type
          in: query
          schema: { type: string }
          description: 流水类型，例如 payment_grant、redem_redeem、admin_adjust、refund_deduct、manual_credit、manual_debit。
        - name: source_type
          in: query
          schema: { type: string }
          description: 来源类型，例如 payment_order、payment_event、redem_code、admin_action、refund。
        - name: source_id
          in: query
          schema: { type: string }
          description: 来源 ID、本地订单号或事件 ID。
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: 当前用户额度流水分页。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/QuotaTransactionPage"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/redem:
    post:
      tags: [User Usage]
      summary: 使用充值码
      description: 基础实现；兑换未使用且未过期的充值码，事务内标记 redem_codes used/used_by/used_at、增加当前用户 quota，并写入 quota_transactions 幂等流水和 redem_code.redeem 管理审计。审计摘要只保存脱敏兑换码、额度、使用人和兑换后余额；已使用、已作废、已过期、不存在或参数无效的充值码不会入账，会写 redem_code.redeem_denied 拒绝审计，error_code 包含 redem_code_invalid_or_used、redem_code_expired 或 redem_code_required。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemCodeRequest"
      responses:
        "200":
          description: 兑换成功，返回本次增加额度和当前余额。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RedeemCodeResult"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/models:
    get:
      tags: [User Usage]
      summary: 当前用户可用模型
      description: 基础实现；返回启用通道暴露且未被 channel_model_prices.user_enabled=false 隐藏的去重模型列表。默认可见通道命中启用 channel_model_prices 时，price_rule 返回 channel_model_price:<price_mode>:v<rule_version>；否则命中启用 model_prices 时返回 model_price:<price_mode>:v<rule_version>；都未命中时回退 minimum_usage。
      security:
        - UserJWT: []
      responses:
        "200":
          description: 当前可见模型列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserModelListResult"
        "401":
          $ref: "#/components/responses/StandardUnauthorized"
  /v0/user/payment/products:
    get:
      tags: [User Payment]
      summary: 充值商品列表
      description: 返回当前启用的服务端充值商品。quota 为 base_quota + bonus_quota，客户端不能直接指定入账额度。
      security:
        - UserJWT: []
      responses:
        "200":
          description: 可购买商品列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PaymentProductInfo"
  /v0/user/payment/orders:
    post:
      tags: [User Payment]
      summary: 创建支付订单
      description: 基础实现；provider 必须已通过 payment.stripe.enabled 或 payment.epay.enabled 启用。创建本地 pending 订单并保存商品快照，按 payment.order_expire_minutes 生成 expires_at，成功后写 payment_order.create 管理审计；审计摘要不保存 checkout_url。本地参数、provider 未启用、商品不可用或 provider checkout 发起失败会写 payment_order.create_denied，error_code 包含 payment_order_provider_disabled、payment_order_product_unavailable 或 payment_order_provider_checkout_failed。Stripe 在 PAYMENT_STRIPE_SECRET_KEY 和绝对 return_url 齐全时创建 Checkout Session 并保存 session.id/session.url；易支付网关、商户号、回调 URL 和 PAYMENT_EPAY_KEY 配置齐全时返回签名收银台 URL；配置不足时返回安全 checkout 占位链接。
      security:
        - UserJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentOrderRequest"
      responses:
        "200":
          description: 订单创建成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderInfo"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
    get:
      tags: [User Payment]
      summary: 当前用户支付订单列表
      description: 查询当前用户自己的支付订单分页列表；只返回本用户订单和服务端保存的订单快照，不允许通过筛选读取其他用户订单。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 当前用户订单分页。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderPage"
  /v0/user/payment/orders/{order_no}:
    get:
      tags: [User Payment]
      summary: 当前用户支付订单详情
      description: 查询当前用户自己的单个支付订单详情；订单不存在或不属于当前用户时返回 404，不泄露其他用户订单状态。
      security:
        - UserJWT: []
      parameters:
        - name: order_no
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 当前用户订单详情。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderInfo"
        "404":
          description: 订单不存在或不属于当前用户。
  /v0/user/payment/orders/{order_no}/cancel:
    post:
      tags: [User Payment]
      summary: 取消未支付订单
      description: 当前用户取消自己的 pending 支付订单，订单置为 closed 并写 payment_order.cancel 审计；已 closed 订单幂等返回当前状态，已支付、退款中或已退款订单拒绝取消并写 payment_order.cancel_denied，error_code 包含 payment_order_cancel_not_pending 或 payment_order_cancel_not_found，不会增加用户额度。
      security:
        - UserJWT: []
      parameters:
        - name: order_no
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 取消成功或订单已关闭。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderInfo"
        "400":
          $ref: "#/components/responses/StandardBadRequest"
        "404":
          description: 订单不存在或不属于当前用户。
  /v0/payment/stripe/webhook:
    post:
      tags: [Payment Webhook]
      summary: Stripe Webhook 异步通知
      description: 基础实现；使用 PAYMENT_STRIPE_WEBHOOK_SECRET 校验 Stripe-Signature 原始 body 签名。checkout.session.completed 且 payment_status=paid 时校验 metadata.order_no、metadata.product_id、metadata.user_id、amount_total 和 currency，成功事件会写 payment_events、将 pending 订单置为 paid、写 quota_transactions、增加用户额度，并写 payment_webhook.processed 和 payment_order.paid 审计。checkout.session.async_payment_failed 会在同样校验订单快照后将 pending 订单置为 failed，写 payment_webhook.failed 审计且不增加额度。charge.refunded 全额或部分退款事件会校验金额和币种，将 paid 订单置为 refunded 或 partially_refunded，写 payment_refund.processed；payment.refund.auto_deduct=true 且扣回成功时写 refund_deduct 流水和 payment_refund.deducted 审计，部分退款按退款金额比例扣回。charge.dispute.created/updated/closed/funds_withdrawn/funds_reinstated 争议生命周期事件会校验金额和币种，按 provider_dispute_id 更新 payment_disputes 当前事实，并写 payment_dispute.created、payment_dispute.updated、payment_dispute.closed 或 payment_dispute.funds_changed 审计；payment.dispute.auto_disable_tokens=true 时仅在 created 阶段禁用该用户已启用 API Key，revoked_reason=payment_dispute，且不直接修改额度或订单状态。重复事件幂等返回 success。
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
          description: Stripe webhook 签名 header，格式包含 t 和 v1。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeWebhookEvent"
      responses:
        "200":
          description: provider 通知已接受；响应体为纯文本 success。
          content:
            text/plain:
              schema:
                type: string
                example: success
        "400":
          description: 签名、事件、订单、金额、币种或 metadata 校验失败；响应体为纯文本 fail。
          content:
            text/plain:
              schema:
                type: string
                example: fail
  /v0/payment/epay/notify:
    post:
      tags: [Payment Webhook]
      summary: 易支付异步通知
      description: 基础实现；使用 PAYMENT_EPAY_KEY 校验 MD5 签名，校验 out_trade_no、money 和状态。成功事件会写 payment_events、将 pending 订单置为 paid、写 quota_transactions、增加用户额度，并写 payment_webhook.processed 和 payment_order.paid 审计；明确失败状态会将 pending 订单置为 failed，写 payment_webhook.failed 审计且不增加额度；重复通知幂等返回 success。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/EpayNotifyRequest"
      responses:
        "200":
          description: provider 通知已接受；响应体为纯文本 success。
          content:
            text/plain:
              schema:
                type: string
                example: success
        "400":
          description: 签名、订单、金额或状态校验失败；响应体为纯文本 fail。
          content:
            text/plain:
              schema:
                type: string
                example: fail
  /v0/payment/epay/return:
    get:
      tags: [Payment Webhook]
      summary: 易支付同步返回只读状态
      description: 基础实现；同步返回只读取 RouterX 本地订单状态，不校验为支付成功依据，不写 payment_events，不增加用户额度。入账只依赖易支付异步通知。
      parameters:
        - name: out_trade_no
          in: query
          required: false
          schema: { type: string }
          description: 易支付返回的 RouterX 本地订单号。
        - name: order_no
          in: query
          required: false
          schema: { type: string }
          description: 等价查询参数；当 out_trade_no 为空时使用。
      responses:
        "200":
          description: 本地订单状态。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentOrderInfo"
        "404":
          description: 订单不存在或不是易支付订单。
