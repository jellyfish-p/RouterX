  /v0/admin/audit:
    get:
      tags: [Admin Audit]
      summary: 管理审计日志列表
      description: 超级管理员查询管理审计日志；当前基础实现已覆盖 API Key 创建、编辑、禁用、删除、轮换、泄露上报、批量禁用、批量过期、用户端额度编辑拒绝，普通用户创建、编辑、禁用、删除、拒绝角色变更，支付商品创建、更新、启用、禁用，支付订单创建，settings 更新，用户调额，充值码管理，通道创建、编辑、启用、禁用、删除、测试和拉取模型，管理员账号创建、编辑、禁用、删除和超级管理员权限拒绝，以及日志清理审计。
      security:
        - UserJWT: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: action
          in: query
          required: false
          schema: { type: string }
          description: 动作过滤，例如 api_key.created、api_key.quota_limit_denied、user.create、payment_product.create、payment_order.create、channel.update、log.clear 或 admin.denied。
        - name: resource_type
          in: query
          required: false
          schema: { type: string }
          description: 资源类型过滤，例如 api_key、user、payment_product、payment_order、channel、log 或 admin。
        - name: resource_id
          in: query
          required: false
          schema: { type: string }
          description: 资源 ID 过滤。
        - name: actor_user_id
          in: query
          required: false
          schema: { type: integer, format: uint64 }
          description: 操作人用户 ID 过滤。
        - name: result
          in: query
          required: false
          schema:
            type: string
            enum: [success, failed, denied]
          description: 审计结果过滤。
        - name: error_code
          in: query
          required: false
          schema: { type: string }
          description: 失败或拒绝 code 过滤，例如 api_key_quota_edit_forbidden。
        - name: start_time
          in: query
          required: false
          schema: { type: integer, format: int64 }
          description: 起始 Unix 秒，按 created_at >= start_time 过滤。
        - name: end_time
          in: query
          required: false
          schema: { type: integer, format: int64 }
          description: 结束 Unix 秒，按 created_at <= end_time 过滤。
      responses:
        "200":
          description: 管理审计分页列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AdminAuditLogPage"
        "403":
          $ref: "#/components/responses/StandardForbidden"
