        - ApiKeyBearer: []
      parameters:
        - $ref: "#/components/parameters/RouterXOptions"
        - $ref: "#/components/parameters/RouterXHop"
        - $ref: "#/components/parameters/RouterXChain"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageRequest"
      responses:
        "200":
          description: Anthropic-compatible message response; stream=true 时返回 Anthropic SSE。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicMessageResponse"
            text/event-stream:
              schema:
                type: string
        "4XX":
          $ref: "#/components/responses/AnthropicError"
        "5XX":
          $ref: "#/components/responses/AnthropicError"
