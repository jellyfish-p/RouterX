          example: risk_review
      description: token_ids 和 user_id 至少提供一个，避免误禁用全部 Key。
    BatchExpireTokensRequest:
      type: object
      properties:
        token_ids:
          type: array
          items: { type: integer, format: uint64 }
          description: 指定要立即过期的 API Key ID 列表。
        user_id:
          type: integer
          format: uint64
          nullable: true
          description: 按所属用户批量过期；可与 token_ids 组合取交集。
        reason:
          type: string
          maxLength: 128
          description: 批量过期原因；为空时使用 admin_batch_expire。
          example: risk_review
      description: token_ids 和 user_id 至少提供一个，避免误过期全部 Key。
    Token:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        user_id: { type: integer, format: uint64 }
        name: { type: string }
        status: { type: integer }
        expired_at: { type: string, format: date-time, nullable: true }
        remain_quota: { type: integer, format: int64 }
        unlimited: { type: boolean }
        rotated_from_id:
          type: integer
          format: uint64
          nullable: true
          description: 轮换来源 API Key ID。
        revoked_reason:
          type: string
          description: 禁用原因；启用 Key 通常为空。
        scope:
          $ref: "#/components/schemas/TokenScope"
        metadata:
          $ref: "#/components/schemas/TokenMetadata"
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: 最近一次成功或失败调用时间。
        last_used_ip_hash:
          type: string
          description: 最近来源 IP 的 SHA-256 摘要；不返回原始 IP。
          example: "b1f0c2d3e4f506172839405162738495a6b7c8d9e0f11223344556677889900a"
        last_user_agent_hash:
          type: string
          description: 最近 User-Agent 的 SHA-256 摘要；不返回原始 User-Agent。
          example: "a2f0c2d3e4f506172839405162738495b6c7d8e9f0011223344556677889900b"
        last_model:
          type: string
          description: 最近请求模型名。
          example: gpt-4o-mini
        last_error_code:
          type: string
          description: 最近失败的协议化错误 code；最近调用成功时为空。
          example: rate_limit_exceeded
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TokenScope:
      type: object
      properties:
        allow_models:
          type: array
          description: 当前已实现的模型 allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["gpt-4o-mini"]
        api_types:
          type: array
          description: 当前已实现的 APIType allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["openai.chat"]
        channel_groups:
          type: array
          description: 当前已实现的通道分组 allow-list；为空或不存在表示继承用户和系统策略。
          items:
            type: string
          example: ["cheap"]
