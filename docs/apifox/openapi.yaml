    BatchSetSettingsRequest:
      type: object
      description: 顶层对象为 key/value 字符串映射；登录相关 key 包括 auth.login.username_password.enabled=true、auth.login.email_password.enabled=false 和 auth.login.phone_password.enabled=false，其中用户名密码登录不得关闭；注册相关 key 包括 auth.register.enabled=false、auth.register.username.enabled=true、auth.register.captcha.required=true、auth.register.default_quota=0 和 auth.register.default_group_id=default；访问控制相关 key 包括 billing.default_user_channel_group_access='["default"]' 和 billing.user_group_channel_group_access='{"vip":{"allow":["premium"],"deny":["experimental"]}}'；倍率相关 key 包括 billing.user_group_ratios='{"vip":0.8}'、billing.channel_group_ratios='{"premium":1.2}' 和 billing.user_group_channel_ratios='{"vip":{"premium":0.9}}'，组合倍率命中时覆盖用户分组倍率和通道分组倍率的乘积；限流相关 key 包括 rate_limit.enabled=true、rate_limit.global_per_min=1000、rate_limit.per_ip_per_min=30、rate_limit.per_token_per_min=60、rate_limit.per_user_per_min=0、rate_limit.per_model_per_min=0 和 rate_limit.per_channel_per_min=0，0 表示关闭对应维度；usage 缺失策略可设置 billing.usage_missing_strategy=minimum 或 reject；Relay 重试、熔断和后台探测可设置 relay.retry_count=1、relay.retry_on_status='[429,500,502,503,504]'、relay.error_auto_ban=true、relay.error_ban_threshold=10、relay.error_ban_cooldown_seconds=300、relay.error_probe_enabled=true、relay.error_probe_interval_seconds=60 和 relay.error_probe_batch_size=20；通道候选缓存可设置 routing.channel_cache.enabled=true、routing.channel_cache.preload=true、routing.channel_cache.ttl_seconds=60 和 routing.channel_cache.version=1，Redis 可用时会共享排序后的候选快照，实例按 version 和内嵌 TTL 被动失效，并通过 routing:channel_candidate_cache:invalidate 主动广播清理本地缓存；支付争议策略可设置 payment.dispute.auto_disable_tokens=true，易支付退款请求地址可设置 payment.epay.refund_url。
      additionalProperties:
        type: string
      example:
        auth.login.username_password.enabled: "true"
        auth.login.email_password.enabled: "false"
        auth.login.phone_password.enabled: "false"
        auth.register.enabled: "false"
        auth.register.username.enabled: "true"
        auth.register.captcha.required: "true"
        auth.register.default_quota: "0"
        auth.register.default_group_id: "default"
        rate_limit.enabled: "true"
        rate_limit.global_per_min: "1000"
        rate_limit.per_ip_per_min: "30"
        rate_limit.per_token_per_min: "60"
        rate_limit.per_user_per_min: "0"
        rate_limit.per_model_per_min: "0"
        rate_limit.per_channel_per_min: "0"
        billing.default_user_channel_group_access: '["default"]'
        billing.user_group_channel_group_access: '{"vip":{"allow":["premium"],"deny":["experimental"]}}'
        billing.user_group_ratios: '{"vip":0.8}'
        billing.channel_group_ratios: '{"premium":1.2}'
        billing.user_group_channel_ratios: '{"vip":{"premium":0.9}}'
        billing.usage_missing_strategy: "reject"
        relay.retry_count: "1"
        relay.retry_on_status: "[429,500,502,503,504]"
        relay.error_auto_ban: "true"
        relay.error_ban_threshold: "10"
        relay.error_ban_cooldown_seconds: "300"
        relay.error_probe_enabled: "true"
        relay.error_probe_interval_seconds: "60"
        relay.error_probe_batch_size: "20"
        routing.channel_cache.enabled: "true"
        routing.channel_cache.preload: "true"
        routing.channel_cache.ttl_seconds: "60"
        routing.channel_cache.version: "1"
        observability.structured_logs_enabled: "true"
        payment.dispute.auto_disable_tokens: "true"
        payment.epay.refund_url: "https://pay.example.com/refund"
